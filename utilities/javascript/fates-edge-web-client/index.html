<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fate's Edge Toolkit v4.1.2a - A modular TTRPG companion." />
    <meta name="theme-color" content="#0f1117" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%94%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <title>Fate's Edge Toolkit v4.1.2a</title>

    <!-- Preconnect for CDN performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <!--
      Stylesheet: consolidated into one file (app.css) which includes
      everything that used to live in base.css / components.css /
      layout.css / themes.css — AND travel-planner.css, which was
      never actually linked here before (it wasn't in this <head> at
      all), so any .travel-card / .travel-modal / .timer-badge
      styling was silently missing. If you'd rather keep the split
      files, just re-add the four links in the same order as before
      and drop this one; nothing else here depends on the filename.
    -->
    <link rel="stylesheet" href="css/app.css" />

    <!--
      NOTE: the page-specific inline sidebar <style> block that used
      to live here has been removed. It duplicated rules already in
      layout.css/base.css but with different hardcoded colors
      (#d4af37 gold, #4caf50 green) instead of the theme's
      var(--gold)/var(--accent-green) — so the sidebar's accent never
      quite matched the rest of the app, and it also completely
      ignored the light theme (html.light) since none of its colors
      were theme variables. The sidebar/nav rules in app.css now cover
      everything that block did, including the disabled-state style
      for GM Tools, using the real theme tokens so both themes work.
    -->

    <!-- Seed loading script -->
    <script>
        (function() {
            if (window.__RANDOM_SEED) return;
            try {
                const stored = localStorage.getItem('fates-edge-seed');
                if (stored) { window.__RANDOM_SEED = stored; return; }
            } catch (e) {}
            
            fetch('.seed/random-seed.json')
                .then(r => r.json())
                .then(data => {
                    if (data && data.seed) {
                        window.__RANDOM_SEED = data.seed;
                        try { localStorage.setItem('fates-edge-seed', data.seed); } catch (e) {}
                    }
                })
                .catch(() => fetch('data/seed.json')
                    .then(r => r.json())
                    .then(data => { if (data && data.seed) window.__RANDOM_SEED = data.seed; })
                    .catch(() => {})
                );
        })();
    </script>
    <script src="seed.js" defer></script>

    <!-- Third-party libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0" defer></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" defer></script>
</head>
<body>

    <!-- ===== PASSWORD OVERLAY ===== -->
    <div class="password-overlay" id="passwordOverlay" role="dialog" aria-modal="true" aria-label="Password gate">
        <div class="gate-box">

            <div class="gate-sub">Enter the playtester password to continue</div>

                    </button>
                    <!-- Whiteboard -->

        <!-- ===== MAIN CONTENT ===== -->

    <!-- ===== TOAST CONTAINER ===== -->

    <!-- ===== ROLE-BASED FEATURE TOGGLING ===== -->
    <script>
        // Global function to enable/disable GM Tools sidebar button
        window.setGmToolsDisabled = function(disabled) {
            const btn = document.getElementById('nav-gm-tools');
            if (btn) {
                btn.disabled = disabled;
                btn.title = disabled ? 'Disabled by Server Admin' : 'GM Tools';
            }
        };

        // Listen for role updates from VTT module (gmRoleUpdate custom event)
        document.addEventListener('gmRoleUpdate', (e) => {
            const role = e.detail?.role;
            window.setGmToolsDisabled(role !== 'gm');
        });

        // Presence update fallback (if role is transmitted via presence event)
        document.addEventListener('presenceUpdate', (e) => {
            const myId = window.__vttClientId || (window.vttState && window.vttState.socketId);
            if (!myId || !e.detail || !e.detail.clients) return;
            const me = e.detail.clients.find(c => c.id === myId);
            if (me) {
                window.setGmToolsDisabled(me.role !== 'gm');
            }
        });

        // The VTT module will set this when connected
        window.__vttClientId = null;
    </script>

    <!-- ===== APPLICATION ENTRY ===== -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
