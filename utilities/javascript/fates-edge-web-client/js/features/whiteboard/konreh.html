<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kon'reh — Apex, Sanctum, and Reforge</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(circle at 50% 20%, #1c1d2a 0%, #0a0a0e 70%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e8e6df;
    display: flex; align-items: center; justify-content: center;
  }
  .landing { text-align: center; }
  .landing h1 { color: #d4af37; font-size: 32px; margin-bottom: 4px; letter-spacing: 0.02em; }
  .landing p { color: #9a9aa8; margin-top: 0; }
  .landing button {
    margin-top: 24px; background: #d4af37; color: #1a1400; border: none;
    padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.02em;
  }
  .landing button:hover { background: #e6c250; }
</style>
</head>
<body>
  <div class="landing">
    <h1>Kon'reh</h1>
    <p>Apex, Sanctum, and Reforge</p>
    <button id="play-btn">▶ Play</button>
  </div>

  <!-- Import the combined engine + UI module -->
  <script type="module">
    import { openKonrehModal } from './kon-reh.js';

    document.getElementById('play-btn').addEventListener('click', () => {
      // Open the modal; the modal will show the game board and all features.
      openKonrehModal();
    });

    // Auto-open the modal as well (like the original did)
    openKonrehModal();
  </script>
</body>
</html>
