<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fate's Edge Toolkit v3.0 — Modular</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/themes.css" />
    
    <!-- Third-party libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <!-- ===== PASSWORD OVERLAY ===== -->
    <div class="password-overlay" id="passwordOverlay" role="dialog" aria-label="Password gate">
        <div class="gate-box">
            <div class="gate-icon">⚔️</div>
            <div class="gate-title">Fate's Edge</div>
            <div class="gate-sub">Enter the playtester password to continue</div>
            <div class="gate-error" id="gateError"></div>
            <input type="password" class="gate-input" id="gateInput" placeholder="Enter password…" autocomplete="current-password" />
            <button class="gate-btn" id="gateBtn">Unlock</button>
            <div class="gate-foot">— playtester access only —</div>
        </div>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <nav class="sidebar" id="sidebar" role="navigation">
        <div class="sidebar-brand">
            <span class="brand-icon">⚔️</span>
            <div class="brand-text">
                <span class="brand-name">Fate's Edge</span>
                <span class="brand-version">v3.0</span>
            </div>
        </div>
        
        <div class="sidebar-nav" id="sidebarNav">
            <button class="nav-item active" data-tab="home" title="Home">
                <span class="nav-icon">📜</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-tab="dashboard" title="Dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Dashboard</span>
            </button>
            <button class="nav-item" data-tab="characters" title="Characters">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Characters</span>
            </button>
            <button class="nav-item" data-tab="builder" title="Builder">
                <span class="nav-icon">🛠️</span>
                <span class="nav-label">Builder</span>
            </button>
            <button class="nav-item" data-tab="dice" title="Dice Roller">
                <span class="nav-icon">🎲</span>
                <span class="nav-label">Dice</span>
            </button>
            <button class="nav-item" data-tab="timers" title="Timers">
                <span class="nav-icon">⏱️</span>
                <span class="nav-label">Timers</span>
            </button>
            <button class="nav-item" data-tab="encounters" title="Encounters">
                <span class="nav-icon">⚔️</span>
                <span class="nav-label">Encounters</span>
            </button>
            <button class="nav-item" data-tab="factions" title="Factions & Assets">
                <span class="nav-icon">🏛️</span>
                <span class="nav-label">Factions</span>
            </button>
            <button class="nav-item" data-tab="vtt" title="Virtual Tabletop">
                <span class="nav-icon">💬</span>
                <span class="nav-label">VTT</span>
            </button>
             <!-- In the sidebar nav -->
            <button class="nav-item" data-tab="scene-tools" title="Scene Tools">
                <span class="nav-icon">🎯</span>
                <span class="nav-label">Scene Tools</span>
            </button>
            
<!-- The Kanban and Whiteboard are accessible from within Scene Tools -->
            <button class="nav-item" data-tab="docs" title="Documentation">
                <span class="nav-icon">📄</span>
                <span class="nav-label">Docs</span>
            </button>
            <button class="nav-item" data-tab="search" title="Search">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Search</span>
            </button>
            <button class="nav-item" data-tab="wiki" title="Wiki">
                <span class="nav-icon">📖</span>
                <span class="nav-label">Wiki</span>
            </button>
            <button class="nav-item" data-tab="decks" title="Decks">
                <span class="nav-icon">🃏</span>
                <span class="nav-label">Decks</span>
            </button>
            <button class="nav-item" data-tab="patrons" title="Patrons">
                <span class="nav-icon">👁️</span>
                <span class="nav-label">Patrons</span>
            </button>
            <button class="nav-item" data-tab="settings" title="Settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </div>
        
        <div class="sidebar-footer">
            <div class="footer-status">
                <span class="status-dot" id="save-status"></span>
                <span class="status-label">Saved</span>
            </div>
            <div class="footer-actions">
                <button class="footer-btn" id="exportBtn" title="Export JSON">⬇</button>
                <button class="footer-btn" id="importBtn" title="Import JSON">⬆</button>
                <input type="file" id="importFile" accept=".json" style="display:none" />
                <button class="footer-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main">
        <!-- All tab content containers -->
        <div id="tab-home" class="tab-content active"></div>
        <div id="tab-dashboard" class="tab-content"></div>
        <div id="tab-characters" class="tab-content"></div>
        <div id="tab-builder" class="tab-content"></div>
        <div id="tab-dice" class="tab-content"></div>
        <div id="tab-timers" class="tab-content"></div>
        <div id="tab-encounters" class="tab-content"></div>
        <div id="tab-factions" class="tab-content"></div>
        <div id="tab-vtt" class="tab-content"></div>
        <div id="tab-scene-tools" class="tab-content"></div>
        <div id="tab-docs" class="tab-content"></div>
        <div id="tab-search" class="tab-content"></div>
        <div id="tab-wiki" class="tab-content"></div>
        <div id="tab-decks" class="tab-content"></div>
        <div id="tab-patrons" class="tab-content"></div>
        <div id="tab-settings" class="tab-content"></div>
        
        <!-- Legacy hidden tabs -->
        <div id="tab-consequences" class="tab-content" style="display:none;"></div>
        <div id="tab-regional" class="tab-content" style="display:none;"></div>
    </main>

    <!-- ===== MODALS ===== -->
    <div class="modal-overlay" id="charModal">
        <div class="modal">
            <button class="modal-close" id="charModalClose">&times;</button>
            <h2 id="char-modal-title">Character Editor</h2>
            <div id="char-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="timerModal">
        <div class="modal">
            <button class="modal-close" id="timerModalClose">&times;</button>
            <h2 id="timer-modal-title">Timer Editor</h2>
            <div id="timer-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="wikiModal">
        <div class="modal">
            <button class="modal-close" id="wikiModalClose">&times;</button>
            <h2 id="wiki-modal-title">Wiki Entry</h2>
            <div id="wiki-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="talentModal">
        <div class="modal">
            <button class="modal-close" id="talentModalClose">&times;</button>
            <h2 id="talent-modal-title">Talent Editor</h2>
            <div id="talent-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="wizardModal">
        <div class="modal" style="max-width:800px;">
            <button class="modal-close" id="wizardModalClose">&times;</button>
            <h2 id="wizard-title">Character Wizard</h2>
            <div id="wizard-steps"></div>
            <div class="flex mt-1" id="wizard-nav">
                <button class="btn" id="wizard-back">← Back</button>
                <button class="btn btn-gold" id="wizard-next">Next →</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="encounterModal">
        <div class="modal" style="max-width:900px;">
            <button class="modal-close" id="encounterModalClose">&times;</button>
            <h2 id="encounter-modal-title">Encounter Editor</h2>
            <div id="encounter-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="npcModal">
        <div class="modal" style="max-width:700px;">
            <button class="modal-close" id="npcModalClose">&times;</button>
            <h2 id="npc-modal-title">NPC Editor</h2>
            <div id="npc-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="combatModal">
        <div class="modal" style="max-width:800px;">
            <button class="modal-close" id="combatModalClose">&times;</button>
            <h2 id="combat-modal-title">Combat Tracker</h2>
            <div id="combat-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="factionModal">
        <div class="modal" style="max-width:700px;">
            <button class="modal-close" id="factionModalClose">&times;</button>
            <h2 id="faction-modal-title">Faction Editor</h2>
            <div id="faction-editor-content"></div>
        </div>
    </div>

    <div class="modal-overlay" id="licenseModal">
        <div class="modal">
            <button class="modal-close" id="licenseModalClose">&times;</button>
            <h2>📜 License Notice</h2>
            <div class="license-box" id="licenseContent"></div>
        </div>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div id="toast-container" role="status" aria-live="polite"></div>

    <!-- ===== APPLICATION ENTRY ===== -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
