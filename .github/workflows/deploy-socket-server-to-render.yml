name: Deploy Socket Server to Render

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        default: 'production'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - production
          - staging
        default: production
      force_deploy:
        type: boolean
        description: 'Force deploy even if no changes'
        default: false

env:
  NODE_VERSION: 22

permissions:
  contents: read
  actions: read

jobs:
  deploy-render:
    name: Deploy Socket Server to Render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    if: >
      always() && (
        github.event_name == 'workflow_call' || 
        github.event_name == 'workflow_dispatch'
      )

    environment:
      name: ${{ inputs.environment || github.event.inputs.environment || 'production' }}
      url: https://fates-edge-socket-server.onrender.com

    steps:
      # ============================================================
      # 1. DOWNLOAD ARTIFACT (if called from build workflow)
      # ============================================================
      - name: Download socket server package
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v4
        with:
          name: socket-server-package
          path: socket-server-package-download

      - name: Extract downloaded artifact
        if: github.event_name == 'workflow_call'
        run: |
          mkdir -p socket-server-deploy
          if [ -f "socket-server-package-download/socket-server.tar.gz" ]; then
            tar -xzf "socket-server-package-download/socket-server.tar.gz" -C socket-server-deploy
            echo "✅ Extracted socket server package"
            rm -rf socket-server-package-download
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ No tar.gz found in downloaded artifact"
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
          fi
        id: extract

      # ============================================================
      # 2. FALLBACK: BUILD FROM SOURCE (if no artifact or manual run)
      # ============================================================
      - name: Checkout source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        uses: actions/checkout@v4

      - name: Setup Node (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build socket server from source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        working-directory: utilities/javascript/fates-edge-socket-server
        run: |
          npm ci
          
          # Create temporary directory outside the source
          mkdir -p ../deploy-temp
          
          # Copy all contents except node_modules and .git
          rsync -a --exclude='node_modules' --exclude='.git' ./ ../deploy-temp/
          
          # Copy data files from repo root if they exist
          if [ -d "../../data" ]; then
            mkdir -p ../deploy-temp/data
            cp -r ../../data/* ../deploy-temp/data/ 2>/dev/null || true
          fi
          
          # Move temp to the expected location in repo root
          rm -rf ../socket-server-deploy
          mv ../deploy-temp ../socket-server-deploy

      # ============================================================
      # 3. PREPARE DEPLOYMENT PACKAGE
      # ============================================================
      - name: Prepare deployment artifact
        run: |
          if [ ! -d "socket-server-deploy" ]; then
            echo "⚠️ Socket server build not found. Skipping deployment."
            exit 1
          fi
          
          echo "📦 Preparing deployment package..."
          cd socket-server-deploy
          tar -czf ../socket-server.tar.gz .
          cd ..
          echo "✅ Socket server packaged for deployment"

      # ============================================================
      # 4. DEPLOY TO RENDER
      # ============================================================
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SOCKET_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ Render secrets not configured. Skipping deployment."
            exit 0
          fi
          
          echo "🚀 Deploying socket server to Render (${{ inputs.environment || github.event.inputs.environment || 'production' }})..."
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys)
          
          echo "📡 Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"id"'; then
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "✅ Deployment triggered successfully!"
            echo "Deploy ID: $DEPLOY_ID"
          else
            ERROR_MSG=$(echo "$RESPONSE" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "❌ Deployment failed: $ERROR_MSG"
            exit 1
          fi

      # ============================================================
      # 5. VERIFY DEPLOYMENT
      # ============================================================
      - name: Verify deployment
        run: |
          echo "⏳ Waiting for service to be ready..."
          sleep 60
          
          URL="https://fates-edge-socket-server.onrender.com"
          MAX_RETRIES=20
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed! Service is ready."
              exit 0
            fi
            
            echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES: Waiting for service... (status: $STATUS)"
            sleep 15
          done
          
          echo "⚠️ Service may not be ready yet. Check manually at: $URL/api/health"