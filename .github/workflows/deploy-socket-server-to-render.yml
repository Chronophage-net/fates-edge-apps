name: Deploy Socket Server to Render

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        default: 'production'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - production
          - staging
        default: production
      force_deploy:
        type: boolean
        description: 'Force deploy even if no changes'
        default: false

env:
  NODE_VERSION: 22

permissions:
  contents: read
  actions: read

jobs:
  deploy-render:
    name: Deploy Socket Server to Render
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: ${{ inputs.environment || github.event.inputs.environment || 'production' }}
      url: https://fates-edge-socket-server.onrender.com
      
    steps:
      # ============================================================
      # 1. DOWNLOAD & EXTRACT ARTIFACT (if called from build workflow)
      # ============================================================
      - name: Download socket server package
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v4
        with:
          name: socket-server-package
          path: socket-server-package-download

      - name: Debug - List download directory
        if: github.event_name == 'workflow_call'
        run: |
          echo "📂 Contents of socket-server-package-download:"
          ls -la socket-server-package-download/ || echo "Directory does not exist"
          echo "🔍 Current working directory:"
          pwd

      - name: Extract downloaded artifact
        if: github.event_name == 'workflow_call'
        id: extract
        run: |
          mkdir -p "${{ github.workspace }}/socket-server-deploy"
          TAR_FILE=$(find socket-server-package-download -name "*.tar.gz" | head -1)
          if [ -n "$TAR_FILE" ]; then
            echo "📦 Extracting $TAR_FILE ..."
            tar -xzf "$TAR_FILE" -C "${{ github.workspace }}/socket-server-deploy"
            echo "✅ Extracted successfully"
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ No .tar.gz found in downloaded artifact"
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
          fi
          rm -rf socket-server-package-download

      - name: Debug - List extracted directory
        if: github.event_name == 'workflow_call'
        run: |
          echo "📂 Contents of socket-server-deploy after extraction:"
          ls -la "${{ github.workspace }}/socket-server-deploy/" || echo "Directory does not exist"

      # ============================================================
      # 2. FALLBACK: BUILD FROM SOURCE (if no artifact or manual run)
      # ============================================================
      - name: Checkout source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        uses: actions/checkout@v4

      - name: Setup Node (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build socket server from source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        run: |
          cd utilities/javascript/fates-edge-socket-server
          npm ci
          npm prune --production

          DEPLOY_DIR="${{ github.workspace }}/socket-server-deploy"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          rsync -a --exclude='.git' ./ "$DEPLOY_DIR/"

          if [ -d "${{ github.workspace }}/data" ]; then
            mkdir -p "$DEPLOY_DIR/data"
            cp -r "${{ github.workspace }}/data/"* "$DEPLOY_DIR/data/" 2>/dev/null || true
          fi

          echo "✅ Fallback build complete"
          echo "📂 Deploy directory created at: $DEPLOY_DIR"
          ls -la "$DEPLOY_DIR" | head -20

      - name: Debug - Check fallback build result
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.downloaded == 'false'
        run: |
          echo "📂 Checking socket-server-deploy after fallback build:"
          if [ -d "${{ github.workspace }}/socket-server-deploy" ]; then
            ls -la "${{ github.workspace }}/socket-server-deploy/" | head -20
          else
            echo "❌ socket-server-deploy still missing!"
            exit 1
          fi

      # ============================================================
      # 3. FINAL CHECK & PREPARE DEPLOYMENT PACKAGE
      # ============================================================
      - name: Final check before packaging
        run: |
          DEPLOY_DIR="${{ github.workspace }}/socket-server-deploy"
          if [ ! -d "$DEPLOY_DIR" ]; then
            echo "❌ socket-server-deploy does not exist. Aborting."
            exit 1
          fi
          if [ -z "$(ls -A "$DEPLOY_DIR")" ]; then
            echo "❌ socket-server-deploy is empty. Aborting."
            exit 1
          fi
          echo "✅ socket-server-deploy found and not empty."

      - name: Prepare deployment artifact
        run: |
          echo "📦 Preparing deployment package..."
          cd "${{ github.workspace }}/socket-server-deploy"
          tar -czf ../socket-server.tar.gz .
          cd ..
          echo "✅ Socket server packaged for deployment"

      # ============================================================
      # 4. DEPLOY TO RENDER
      # ============================================================
      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SOCKET_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ Render secrets not configured. Skipping deployment."
            exit 0
          fi

          echo "🚀 Deploying socket server to Render (${{ inputs.environment || github.event.inputs.environment || 'production' }})..."

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys)

          echo "📡 Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"id"'; then
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "✅ Deployment triggered successfully!"
            echo "Deploy ID: $DEPLOY_ID"
          else
            ERROR_MSG=$(echo "$RESPONSE" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "❌ Deployment failed: $ERROR_MSG"
            exit 1
          fi

      # ============================================================
      # 5. VERIFY DEPLOYMENT
      # ============================================================
      - name: Verify deployment
        run: |
          echo "⏳ Waiting for service to be ready..."
          sleep 60

          URL="https://fates-edge-socket-server.onrender.com"
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed! Service is ready."
              exit 0
            fi

            echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES: Waiting for service... (status: $STATUS)"
            sleep 15
          done

          echo "⚠️ Service may not be ready yet. Check manually at: $URL/api/health"