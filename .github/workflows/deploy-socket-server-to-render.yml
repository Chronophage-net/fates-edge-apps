name: Deploy Socket Server to Render

on:
  workflow_run:
    workflows: ["Build Apps and Packages"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - production
          - staging
        default: production
      force_deploy:
        type: boolean
        description: 'Force deploy even if no changes'
        default: false

env:
  NODE_VERSION: 22  # ← Match the build workflow

permissions:
  contents: read
  actions: read

jobs:
  deploy-render:
    name: Deploy Socket Server to Render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://fates-edge-socket-server.onrender.com

    steps:
      - name: Download socket server package
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v6
        with:
          name: socket-server-package
          path: socket-server-deploy
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Check if artifact was downloaded
        id: check-artifact
        run: |
          if [ -d "socket-server-deploy" ] && [ "$(ls -A socket-server-deploy)" ]; then
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
            echo "✅ Artifact downloaded successfully"
          else
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No artifact found, will build from source"
          fi

      - name: Checkout and build socket server (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        uses: actions/checkout@v5

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}  # ← Use 22

      - name: Build socket server (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        working-directory: utilities/javascript/fates-edge-socket-server
        run: |
          npm ci
          mkdir -p socket-server-deploy
          cp -r ./* socket-server-deploy/
          # Copy data files if they exist
          [ -d "../../../data" ] && cp -r ../../../data/* socket-server-deploy/data/ 2>/dev/null || true

      - name: Prepare deployment artifact
        run: |
          if [ ! -d "socket-server-deploy" ]; then
            echo "⚠️ Socket server build not found. Skipping deployment."
            exit 1
          fi
          
          echo "📦 Preparing deployment package..."
          cd socket-server-deploy
          tar -czf ../socket-server.tar.gz .
          cd ..
          echo "✅ Socket server packaged for deployment"

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SOCKET_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ Render secrets not configured. Skipping deployment."
            echo "To enable, add RENDER_API_KEY and RENDER_SOCKET_SERVICE_ID to GitHub secrets."
            exit 0
          fi
          
          echo "🚀 Deploying socket server to Render (${{ github.event.inputs.environment || 'production' }})..."
          echo "Service ID: $RENDER_SERVICE_ID"
          
          # Trigger deployment via Render API
          # Valid values: "clear" or "do_not_clear"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys)
          
          echo "📡 Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"id"'; then
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "✅ Deployment triggered successfully!"
            echo "Deploy ID: $DEPLOY_ID"
            echo "📊 Dashboard: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID"
          else
            ERROR_MSG=$(echo "$RESPONSE" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ -n "$ERROR_MSG" ]; then
              echo "❌ Deployment failed: $ERROR_MSG"
            else
              echo "❌ Deployment failed. Response: $RESPONSE"
            fi
            exit 1
          fi

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for service to be ready..."
          sleep 60  # Give it a full minute before checking
          
          URL="https://fates-edge-socket-server.onrender.com"
          MAX_RETRIES=20  # Increased from 10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed! Service is ready."
              exit 0
            fi
            
            echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES: Waiting for service... (status: $STATUS)"
            sleep 15
          done
          
          echo "⚠️ Service may not be ready yet. Check manually at: $URL/api/health"
          echo "📊 Dashboard: https://dashboard.render.com/web/${{ secrets.RENDER_SOCKET_SERVICE_ID }}"

      - name: Deployment Summary
        if: always()
        run: |
          echo "========================================="
          echo "📊 DEPLOYMENT COMPLETE"
          echo "========================================="
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "URL: https://fates-edge-socket-server.onrender.com"
          echo "Dashboard: https://dashboard.render.com/web/${{ secrets.RENDER_SOCKET_SERVICE_ID }}"
          echo "========================================="