name: Deploy Socket Server to Render

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        default: 'production'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - production
          - staging
        default: production
      force_deploy:
        type: boolean
        description: 'Force deploy even if no changes'
        default: false

env:
  NODE_VERSION: 22

permissions:
  contents: read
  actions: read

jobs:
  deploy-render:
    name: Deploy Socket Server to Render
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: ${{ inputs.environment || github.event.inputs.environment || 'production' }}
      url: https://fates-edge-socket-server.onrender.com

    steps:
      - name: Download socket server package
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v4
        with:
          name: socket-server-package
          path: socket-server-package-download
        continue-on-error: true

      - name: Extract downloaded artifact (if found)
        if: github.event_name == 'workflow_call'
        id: extract
        run: |
          mkdir -p "${{ github.workspace }}/socket-server-deploy"
          TAR_FILE=$(find socket-server-package-download -name "*.tar.gz" | head -1)
          if [ -n "$TAR_FILE" ]; then
            tar -xzf "$TAR_FILE" -C "${{ github.workspace }}/socket-server-deploy"
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
          rm -rf socket-server-package-download

      - name: Checkout source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.found != 'true'
        uses: actions/checkout@v4

      - name: Setup Node (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.found != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build socket server from source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.extract.outputs.found != 'true'
        run: |
          cd utilities/javascript/fates-edge-socket-server
          npm ci
          npm prune --production

          DEPLOY_DIR="${{ github.workspace }}/socket-server-deploy"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"

          rsync -a --exclude='.git' ./ "$DEPLOY_DIR/"

          if [ -d "${{ github.workspace }}/data" ]; then
            mkdir -p "$DEPLOY_DIR/data"
            cp -r "${{ github.workspace }}/data/"* "$DEPLOY_DIR/data/" || true
          fi

      - name: Verify deploy directory
        run: |
          DEPLOY_DIR="${{ github.workspace }}/socket-server-deploy"
          if [ ! -d "$DEPLOY_DIR" ] || [ -z "$(ls -A "$DEPLOY_DIR")" ]; then
            echo "❌ socket-server-deploy is missing or empty."
            exit 1
          fi

      - name: Prepare deployment artifact
        run: |
          cd "${{ github.workspace }}/socket-server-deploy"
          tar -czf ../socket-server.tar.gz .
          cd ..

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SOCKET_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ Render secrets not configured. Skipping deployment."
            exit 0
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys)

          if echo "$RESPONSE" | grep -q '"id"'; then
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Deployment triggered: $DEPLOY_ID"
          else
            ERROR_MSG=$(echo "$RESPONSE" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Deployment failed: $ERROR_MSG"
            exit 1
          fi

      - name: Verify deployment
        run: |
          sleep 60
          URL="https://fates-edge-socket-server.onrender.com"
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check timed out"
          exit 1
