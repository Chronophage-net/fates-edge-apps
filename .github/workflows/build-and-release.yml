name: Build All Apps & Create Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write
  packages: write

env:
  NODE_VERSION: 22
  PYTHON_VERSION: '3.10'

jobs:
  # ─── Build Non-Desktop Components ──────────────────────────────
  build-components:
    name: Build Components
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG="${{ github.ref_name }}"
            echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "release_name=${TAG}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            BUILD_DATE=$(date +'%Y-%m-%d')
            RUN_NUM="${{ github.run_number }}"
            BUILD_TAG="build-${BUILD_DATE}-${RUN_NUM}"
            echo "release_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
            echo "release_name=Build #${RUN_NUM} (${BUILD_DATE})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            utilities/javascript/fates-edge-web-client/package-lock.json
            utilities/javascript/fates-edge-socket-server/package-lock.json
            utilities/vtt_mods_bots/fates-edge-discord-bot/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ─── Web Client ────────────────────────────────────────────
      # The web client is mostly static files. The build just generates
      # seed.js into dist/. We assemble a staging directory with ALL
      # deployable files (static + generated), so nothing gets lost.

      - name: Build Web Client
        run: |
          cd utilities/javascript/fates-edge-web-client
          npm ci
          npm run build
          echo "--- dist/ contents after build ---"
          ls -la dist/ 2>/dev/null || echo "(no dist/ directory)"

      - name: Stage web client for deployment
        run: |
          STAGING="$GITHUB_WORKSPACE/web-client-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          # Copy ALL static files from the web client root, excluding
          # dev/build artifacts. rsync preserves directory structure
          # and handles everything (index.html, js/, css/, data/, etc.)
          rsync -a \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='scripts' \
            --exclude='.git' \
            --exclude='.eslintrc*' \
            --exclude='.eslintignore' \
            --exclude='dist' \
            utilities/javascript/fates-edge-web-client/ "$STAGING/"

          # Overlay the generated build output (seed.js etc.) on top
          if [ -d "utilities/javascript/fates-edge-web-client/dist" ]; then
            cp -a utilities/javascript/fates-edge-web-client/dist/. "$STAGING/"
          fi

      - name: Verify data folder in staging
        run: |
          STAGING="$GITHUB_WORKSPACE/web-client-staging"
          if [ ! -d "$STAGING/data" ]; then
            echo "❌ data folder missing from staging!"
            echo "--- staging contents ---"
            ls -la "$STAGING/"
            exit 1
          fi
          echo "✅ data folder is present in staging"
          ls -la "$STAGING/data/"

      - name: Package Web Client
        run: |
          # Tar from the staging root — no dist/ prefix in the archive.
          # This means extraction is a simple one-liner with no mv/rmdir.
          tar -czf web-client.tar.gz -C web-client-staging .

      - name: Inspect web client tarball (data/ check)
        run: |
          if ! tar -tzf web-client.tar.gz | grep -q 'data/'; then
            echo "❌ data folder not found in tarball!"
            tar -tzf web-client.tar.gz | head -30
            exit 1
          fi
          echo "✅ data folder is present in tarball"
          echo "--- tarball top-level entries ---"
          tar -tzf web-client.tar.gz | head -20

      - name: Upload Web Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-client-build
          path: web-client.tar.gz

      # ─── Socket Server ──────────────────────────────────────────
      - name: Build Socket Server
        run: |
          cd utilities/javascript/fates-edge-socket-server
          npm ci
          npm prune --production

      - name: Package Socket Server
        run: |
          cd utilities/javascript/fates-edge-socket-server
          tar -czf ../../../socket-server.tar.gz .

      - name: Upload Socket Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: socket-server-package
          path: socket-server.tar.gz

      # ─── Discord Bot ────────────────────────────────────────────
      - name: Build Discord Bot
        run: |
          cd utilities/vtt_mods_bots/fates-edge-discord-bot
          npm ci
          npm prune --production

      - name: Package Discord Bot
        run: |
          cd utilities/vtt_mods_bots/fates-edge-discord-bot
          tar -czf ../../../discord-bot.tar.gz .

      - name: Upload Discord Bot artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-bot-package
          path: discord-bot.tar.gz

      # ─── Terminal Client ────────────────────────────────────────
      - name: Build Terminal Client
        run: |
          if [ -f "utilities/javascript/fates-edge-terminal/package.json" ]; then
            cd utilities/javascript/fates-edge-terminal
            npm ci
            npm run build 2>/dev/null || echo "No build script, skipping"
          else
            echo "Terminal client not found – skipping"
          fi

      - name: Package Terminal Client
        run: |
          if [ -d "utilities/javascript/fates-edge-terminal" ]; then
            cd utilities/javascript/fates-edge-terminal
            tar -czf ../../../terminal-client.tar.gz .
          else
            echo "No terminal client to package"
            exit 0
          fi

      - name: Upload Terminal Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-client-package
          path: terminal-client.tar.gz
        continue-on-error: true

      # ─── Python Client ──────────────────────────────────────────
      - name: Package Python Client
        run: |
          cd utilities/python/fates-edge-python-client
          tar -czf ../../../python-client.tar.gz .

      - name: Upload Python Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-client-package
          path: python-client.tar.gz

      # ─── Foundry Module ─────────────────────────────────────────
      - name: Package Foundry Module
        run: |
          cd utilities/vtt_mods_bots/foundry_fates-edge-bridge
          tar -czf ../../../foundry-module.tar.gz .

      - name: Upload Foundry Module artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-module-package
          path: foundry-module.tar.gz

      # ─── Roll20 Module ──────────────────────────────────────────
      - name: Package Roll20 Module
        run: |
          cd utilities/vtt_mods_bots/fates-edge-roll20
          tar -czf ../../../roll20-module.tar.gz .

      - name: Upload Roll20 Module artifact
        uses: actions/upload-artifact@v4
        with:
          name: roll20-module-package
          path: roll20-module.tar.gz

  # ─── Desktop Client (platform-specific matrix) ─────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_name: desktop-client-mac
          - os: windows-latest
            platform: win
            artifact_name: desktop-client-win
          - os: ubuntu-latest
            platform: linux
            artifact_name: desktop-client-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: utilities/javascript/fates-edge-desktop-client/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        working-directory: utilities/javascript/fates-edge-desktop-client
        shell: bash
        # dmg-license is in optionalDependencies, so npm ci
        # skips it automatically on non-Darwin platforms.
        run: npm ci

      - name: Build and package
        working-directory: utilities/javascript/fates-edge-desktop-client
        shell: bash
        # Runs "node scripts/build.js" (compile) then the
        # platform-specific electron-builder command.
        run: npm run build && npm run build:${{ matrix.platform }}

      - name: Verify build output
        working-directory: utilities/javascript/fates-edge-desktop-client
        shell: bash
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ Desktop build failed – dist directory is empty"
            exit 1
          fi
          echo "✅ dist contents:"
          ls -la dist/

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            utilities/javascript/fates-edge-desktop-client/dist/*.dmg
            utilities/javascript/fates-edge-desktop-client/dist/*.zip
            utilities/javascript/fates-edge-desktop-client/dist/*.exe
            utilities/javascript/fates-edge-desktop-client/dist/*.AppImage
            utilities/javascript/fates-edge-desktop-client/dist/*.deb
            utilities/javascript/fates-edge-desktop-client/dist/*.rpm
          if-no-files-found: warn

  # ─── Create Release ──────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-components, build-desktop]
    if: needs.build-components.result == 'success' && needs.build-desktop.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-components.outputs.release_tag }}
          name: ${{ needs.build-components.outputs.release_name }}
          draft: ${{ needs.build-components.outputs.prerelease == 'true' }}
          prerelease: ${{ needs.build-components.outputs.prerelease == 'true' }}
          body: |
            ## Automatic build
            - **Date**: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            - **Commit**: ${{ github.sha }}
            - **Triggered by**: ${{ github.triggering_actor }}

            Attached are packaged builds of all Fates Edge components.
          files: |
            artifacts/*/*.tar.gz
            artifacts/desktop-client-mac/*
            artifacts/desktop-client-win/*
            artifacts/desktop-client-linux/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Deploy to Pages ─────────────────────────────────────────────
  deploy-pages:
    name: Deploy Web Client to Pages
    runs-on: ubuntu-latest
    needs: build-components
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web client artifact
        uses: actions/download-artifact@v4
        with:
          name: web-client-build
          path: web-client

      - name: Extract web client
        run: |
          mkdir -p web-client-deploy
          # The tarball has files at the root level (no dist/ prefix)
          # because we tarred from the staging directory directly.
          # So extraction is a single command — no mv, no rmdir, no
          # strip-components. Everything lands in the right place.
          tar -xzf web-client/web-client.tar.gz -C web-client-deploy/
          touch web-client-deploy/.nojekyll

      - name: Verify extracted contents
        run: |
          echo "--- Deploy directory contents ---"
          ls -la web-client-deploy/

          if [ ! -d "web-client-deploy/data" ]; then
            echo "❌ data folder missing after extraction!"
            exit 1
          fi
          echo "✅ data folder is present"
          ls -la web-client-deploy/data/

          if [ ! -f "web-client-deploy/index.html" ]; then
            echo "⚠️ index.html not found in deploy directory"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-client-deploy/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Deploy Socket Server to Render ─────────────────────────────
  deploy-socket-to-render:
    name: Deploy Socket Server to Render
    needs: [build-components, create-release]
    if: needs.build-components.outputs.prerelease == 'false'
    uses: ./.github/workflows/deploy-socket-server.yml
    with:
      environment: production
    secrets: inherit

  # ─── Build & Push Docker Images ──────────────────────────────────
  docker-push:
    name: Build & Push Docker Images
    needs: [build-components, create-release]
    if: needs.build-components.outputs.prerelease == 'false'
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.build-components.outputs.release_tag }}
      push: true
    secrets: inherit
