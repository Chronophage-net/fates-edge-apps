name: Build All Apps & Create Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write
  packages: write

env:
  NODE_VERSION: 22
  PYTHON_VERSION: '3.10'

jobs:
  build:
    name: Build & Package Apps
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG="${{ github.ref_name }}"
            echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "release_name=${TAG}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            BUILD_DATE=$(date +'%Y-%m-%d')
            RUN_NUM="${{ github.run_number }}"
            BUILD_TAG="build-${BUILD_DATE}-${RUN_NUM}"
            echo "release_tag=${BUILD_TAG}" >> $GITHUB_OUTPUT
            echo "release_name=Build #${RUN_NUM} (${BUILD_DATE})" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ─── Web Client ────────────────────────────────────────────────
      - name: Build Web Client
        run: |
          cd utilities/javascript/fates-edge-web-client
          npm ci
          npm run build
          cp -r data dist/   # copy data folder into dist

      - name: Verify data folder in dist
        run: |
          cd utilities/javascript/fates-edge-web-client
          if [ ! -d "dist/data" ]; then
            echo "❌ data folder missing from dist!"
            exit 1
          fi
          echo "✅ data folder present in dist"
          ls -la dist/data/

      - name: Package Web Client
        run: |
          cd utilities/javascript/fates-edge-web-client
          tar -czf ../../../web-client.tar.gz dist/

      - name: Inspect web client tarball
        run: |
          tar -tzf web-client.tar.gz | grep -E '^(dist/)?data/' | head -10
          # Should show data/ entries

      - name: Upload Web Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-client-build
          path: web-client.tar.gz

      # ─── Desktop Client (platform-specific) ──────────────────────
      - name: Build Desktop Client (all platforms)
        run: |
          cd utilities/javascript/fates-edge-desktop-client
          npm ci
          npm run build:all   # produces installers in dist/

      - name: Verify Desktop Client build
        run: |
          cd utilities/javascript/fates-edge-desktop-client
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ Desktop build failed – dist directory is empty"
            exit 1
          fi

      - name: Package Desktop Client (macOS)
        run: |
          cd utilities/javascript/fates-edge-desktop-client
          mkdir -p ../../../desktop-mac
          cp dist/*.dmg dist/*.zip ../../../desktop-mac/ 2>/dev/null || true
          cd ../../../desktop-mac
          tar -czf ../desktop-mac.tar.gz .

      - name: Package Desktop Client (Windows)
        run: |
          cd utilities/javascript/fates-edge-desktop-client
          mkdir -p ../../../desktop-win
          cp dist/*.exe ../../../desktop-win/ 2>/dev/null || true
          cd ../../../desktop-win
          tar -czf ../desktop-win.tar.gz .

      - name: Package Desktop Client (Linux)
        run: |
          cd utilities/javascript/fates-edge-desktop-client
          mkdir -p ../../../desktop-linux
          cp dist/*.AppImage dist/*.deb dist/*.rpm ../../../desktop-linux/ 2>/dev/null || true
          cd ../../../desktop-linux
          tar -czf ../desktop-linux.tar.gz .

      - name: Upload Desktop Client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-client-mac
          path: desktop-mac.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-client-win
          path: desktop-win.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-client-linux
          path: desktop-linux.tar.gz

      # ─── Socket Server ────────────────────────────────────────────
      - name: Build Socket Server
        run: |
          cd utilities/javascript/fates-edge-socket-server
          npm ci
          npm prune --production

      - name: Package Socket Server
        run: |
          cd utilities/javascript/fates-edge-socket-server
          tar -czf ../../../socket-server.tar.gz .

      - name: Upload Socket Server artifact
        uses: actions/upload-artifact@v4
        with:
          name: socket-server-package
          path: socket-server.tar.gz

      # ─── Discord Bot ──────────────────────────────────────────────
      - name: Build Discord Bot
        run: |
          cd utilities/vtt_mods_bots/fates-edge-discord-bot
          npm ci
          npm prune --production

      - name: Package Discord Bot
        run: |
          cd utilities/vtt_mods_bots/fates-edge-discord-bot
          tar -czf ../../../discord-bot.tar.gz .

      - name: Upload Discord Bot artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-bot-package
          path: discord-bot.tar.gz

      # ─── Terminal Client ──────────────────────────────────────────
      - name: Build Terminal Client
        run: |
          if [ -f "utilities/javascript/fates-edge-terminal/package.json" ]; then
            cd utilities/javascript/fates-edge-terminal
            npm ci
            # run build if exists, otherwise just prepare
            npm run build 2>/dev/null || echo "No build script, skipping"
          else
            echo "Terminal client not found – skipping"
          fi

      - name: Package Terminal Client
        run: |
          if [ -d "utilities/javascript/fates-edge-terminal" ]; then
            cd utilities/javascript/fates-edge-terminal
            tar -czf ../../../terminal-client.tar.gz .
          else
            echo "No terminal client to package"
            exit 0
          fi

      - name: Upload Terminal Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-client-package
          path: terminal-client.tar.gz
        continue-on-error: true   # allow if terminal isn't present

      # ─── Python Client ────────────────────────────────────────────
      - name: Package Python Client
        run: |
          cd utilities/python/fates-edge-python-client
          tar -czf ../../../python-client.tar.gz .

      - name: Upload Python Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-client-package
          path: python-client.tar.gz

      # ─── Foundry Module ───────────────────────────────────────────
      - name: Package Foundry Module
        run: |
          cd utilities/vtt_mods_bots/foundry_fates-edge-bridge
          tar -czf ../../../foundry-module.tar.gz .

      - name: Upload Foundry Module artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-module-package
          path: foundry-module.tar.gz

      # ─── Roll20 Module ────────────────────────────────────────────
      - name: Package Roll20 Module
        run: |
          cd utilities/vtt_mods_bots/fates-edge-roll20
          tar -czf ../../../roll20-module.tar.gz .

      - name: Upload Roll20 Module artifact
        uses: actions/upload-artifact@v4
        with:
          name: roll20-module-package
          path: roll20-module.tar.gz

  # ─── Create Release ──────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: ${{ needs.build.outputs.release_name }}
          draft: ${{ needs.build.outputs.prerelease == 'true' }}
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
          body: |
            ## Automatic build
            - **Date**: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            - **Commit**: ${{ github.sha }}
            - **Triggered by**: ${{ github.triggering_actor }}

            Attached are packaged builds of all Fates Edge components.
          files: artifacts/*/*.tar.gz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Deploy to Pages ─────────────────────────────────────────────
  deploy-pages:
    name: Deploy Web Client to Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web client artifact
        uses: actions/download-artifact@v4
        with:
          name: web-client-build
          path: web-client

      - name: Extract web client  
        run: |
          mkdir -p web-client-extracted
          tar -xzf web-client/web-client.tar.gz -C web-client-extracted/
          # Move contents of dist/ to root
          if [ -d "web-client-extracted/dist" ]; then
            mv web-client-extracted/dist/* web-client-extracted/
            rmdir web-client-extracted/dist
          fi
          touch web-client-extracted/.nojekyll
          # Verify data folder is present
          if [ ! -d "web-client-extracted/data" ]; then
            echo "❌ data folder missing after extraction!"
            exit 1
          fi
          echo "✅ data folder present in extraction"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-client-extracted/

      - name: Deploy to Pages
            id: deployment
            uses: actions/deploy-pages@v4

  # ─── Deploy Socket Server to Render ─────────────────────────────
  deploy-socket-to-render:
    name: Deploy Socket Server to Render
    needs: [build, create-release]
    if: needs.build.outputs.prerelease == 'false'
    uses: ./.github/workflows/deploy-socket-server.yml
    with:
      environment: production
    secrets: inherit

  # ─── Build & Push Docker Images ──────────────────────────────────
  docker-push:
    name: Build & Push Docker Images
    needs: [build, create-release]
    if: needs.build.outputs.prerelease == 'false'
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.build.outputs.release_tag }}
      push: true
    secrets: inherit