name: Deploy Web Client to GitHub Pages

on:
  workflow_run:
    workflows: ["Build Apps and Packages"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - github-pages
          - preview
        default: github-pages

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    
    permissions:
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Pages artifact from build workflow
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v6
        with:
          name: github-pages
          path: pages-site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      # ✅ ADD THIS STEP
      - name: Verify downloaded artifact
        id: verify-download
        run: |
          if [ -d "pages-site" ] && [ "$(ls -A pages-site 2>/dev/null)" ]; then
            echo "✅ Pages artifact downloaded successfully"
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
            echo "Contents:"
            ls -la pages-site/ | head -20
          else
            echo "⚠️ Pages artifact download failed or was empty"
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Checkout web client source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        uses: actions/checkout@v5

      - name: Setup Node (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate seed (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        working-directory: utilities/javascript/fates-edge-web-client
        run: |
          echo "🎲 Generating seed..."
          if [ -f js/tools/generate-seed.js ]; then
            node js/tools/generate-seed.js --force --output=.seed/random-seed.json
            mkdir -p data
            cp .seed/random-seed.json data/seed.json 2>/dev/null || true
            cp .seed/seed.js js/seed.js 2>/dev/null || true
          fi

      - name: Prepare static site for Pages (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        run: |
          echo "📦 Preparing static site for GitHub Pages..."
          mkdir -p pages-site
          
          rsync -a \
            --exclude='node_modules' \
            --exclude='Dockerfile*' \
            --exclude='docker-compose.yml' \
            --exclude='Makefile' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='DESIGN.md' \
            --exclude='build.sh' \
            --exclude='vite.config.js' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='js/tests' \
            utilities/javascript/fates-edge-web-client/ pages-site/
          
          echo "📂 Copying data files..."
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md pages-site/
          fi
          
          # wiki.json
          for src in "data/wiki.json" "misc/wiki.json" "utilities/javascript/fates-edge-web-client/data/wiki.json"; do
            if [ -f "$src" ]; then
              cp "$src" pages-site/wiki.json
              break
            fi
          done
          
          # Regions
          for src_dir in "data/regions" "misc/regions" "utilities/javascript/fates-edge-web-client/data/regions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir" pages-site/regions 2>/dev/null || true
              break
            fi
          done
          
          # Factions
          for src_dir in "data/factions" "misc/factions" "utilities/javascript/fates-edge-web-client/data/factions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir" pages-site/factions 2>/dev/null || true
              break
            fi
          done
          
          # Patrons
          for src_dir in "data/patrons" "misc/patrons" "utilities/javascript/fates-edge-web-client/data/patrons"; do
            if [ -d "$src_dir" ]; then
              mkdir -p pages-site/data
              cp -r "$src_dir" pages-site/data/patrons 2>/dev/null || true
              break
            fi
          done
          
          # Seed files (already generated above)
          if [ -f "utilities/javascript/fates-edge-web-client/.seed/random-seed.json" ]; then
            cp utilities/javascript/fates-edge-web-client/.seed/random-seed.json pages-site/data/seed.json 2>/dev/null || true
          fi
          
          echo "✅ Static site prepared"

      - name: Verify pages-site contents
        run: |
          echo "📂 Pages site structure:"
          echo ""
          echo "Root contents:"
          ls -la pages-site/ | head -15
          echo ""
          
          if [ -f "pages-site/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "⚠️ WARNING: index.html not found - site may not render correctly"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4