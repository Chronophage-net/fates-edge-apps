name: Deploy Web Client to GitHub Pages

on:
  workflow_run:
    workflows: ["Build Apps and Packages"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - github-pages
          - preview
        default: github-pages

env:
  NODE_VERSION: 22  # ← Match the build workflow

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    
    permissions:
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ============================================================
      # FALLBACK: Build from source for manual dispatch
      # ============================================================
      - name: Checkout source (fallback for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5

      - name: Setup Node (fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}  # ← Use 22

      - name: Prepare static site (fallback for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "📦 Preparing static site for GitHub Pages (manual dispatch)..."
          mkdir -p pages-site
          
          # Copy the entire web client directory
          cp -r utilities/javascript/fates-edge-web-client/* pages-site/
          
          # Copy data files
          echo "📂 Copying data files..."
          [ -f "LICENSE.md" ] && cp LICENSE.md pages-site/
          
          for src in "data/wiki.json" "misc/wiki.json"; do
            [ -f "$src" ] && cp "$src" pages-site/wiki.json && break
          done
          
          for src in "data/regions" "misc/regions"; do
            [ -d "$src" ] && cp -r "$src" pages-site/regions 2>/dev/null && break
          done
          
          for src in "data/factions" "misc/factions"; do
            [ -d "$src" ] && cp -r "$src" pages-site/factions 2>/dev/null && break
          done
          
          for src in "data/patrons" "misc/patrons"; do
            if [ -d "$src" ]; then
              mkdir -p pages-site/data
              cp -r "$src" pages-site/data/patrons 2>/dev/null
              break
            fi
          done
          
          echo "✅ Static site prepared"

      - name: Upload Pages artifact (fallback for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      # ============================================================
      # DEPLOY TO PAGES
      # ============================================================
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # For workflow_run events: use the build workflow's run ID
          # For workflow_dispatch: this is empty, uses current run's artifact
          github_run_id: ${{ github.event.workflow_run.id }}
          artifact_name: github-pages
          token: ${{ secrets.GITHUB_TOKEN }}