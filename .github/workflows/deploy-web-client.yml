name: Deploy Web Client

on:
  workflow_run:
    workflows: ["Build Apps Packages"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - github-pages
          - preview
        default: github-pages

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    
    permissions:
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download web client artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v6
        with:
          name: web-client-pages-site
          path: pages-site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Checkout web client source
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5

      - name: Prepare static site for Pages
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p pages-site
          
          # Copy the entire web client directory (it's already static)
          cp -r utilities/javascript/fates-edge-web-client/* pages-site/
          
          # Copy data files from the repository root
          echo "📂 Copying data files to Pages site..."
          
          # Wiki
          [ -f "data/wiki.json" ] && cp data/wiki.json pages-site/ || true
          [ -f "misc/wiki.json" ] && cp misc/wiki.json pages-site/ || true
          
          # Regions
          for src in "data/regions" "misc/regions" "utilities/javascript/fates-edge-web-client/regions"; do
            [ -d "$src" ] && cp -r "$src" pages-site/regions 2>/dev/null || true
          done
          
          # Factions
          for src in "data/factions" "misc/factions" "utilities/javascript/fates-edge-web-client/factions"; do
            [ -d "$src" ] && cp -r "$src" pages-site/factions 2>/dev/null || true
          done
          
          # Patrons
          for src in "data/patrons" "misc/patrons"; do
            [ -d "$src" ] && cp -r "$src" pages-site/data/patrons 2>/dev/null || true
          done
          
          # Seed files
          [ -f "data/seed.json" ] && cp data/seed.json pages-site/ || true
          [ -f "data/seed.js" ] && cp data/seed.js pages-site/ || true
          
          echo "✅ Static site prepared for deployment"

      - name: Verify pages-site contents
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "📂 Pages site contents:"
          ls -la pages-site/ | head -20
          echo ""
          echo "📄 Checking for index.html..."
          if [ -f "pages-site/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "⚠️ index.html not found - this might be a problem"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: pages-site