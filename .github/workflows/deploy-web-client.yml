name: Deploy Web Client to GitHub Pages

on:
  workflow_call:
    inputs:
      skip_deploy:
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: inputs.skip_deploy != 'true'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-site
          path: pages-site

      - name: Verify artifact contents
        run: |
          echo "Contents of pages-site:"
          ls -la pages-site | head -20 || true

          if [ ! -f "pages-site/index.html" ]; then
            echo "❌ ERROR: pages-site artifact is missing index.html"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
