name: Deploy Web Client to GitHub Pages

on:
  workflow_run:
    workflows: ["Build Apps and Packages"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy'
        options:
          - github-pages
          - preview
        default: github-pages

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    
    permissions:
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Pages artifact from build workflow
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v6
        with:
          name: github-pages  # This is the name upload-pages-artifact uses
          path: pages-site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Check if artifact was downloaded
        id: check-artifact
        run: |
          if [ -d "pages-site" ] && [ "$(ls -A pages-site)" ]; then
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
            echo "✅ Artifact downloaded successfully"
          else
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No artifact found, will build from source"
          fi

      - name: Checkout web client source (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        uses: actions/checkout@v5

      - name: Prepare static site for Pages (fallback)
        if: github.event_name == 'workflow_dispatch' || steps.check-artifact.outputs.downloaded == 'false'
        run: |
          echo "📦 Preparing static site for GitHub Pages..."
          mkdir -p pages-site
          
          # Copy the entire web client directory (it's already static HTML/CSS/JS)
          cp -r utilities/javascript/fates-edge-web-client/* pages-site/
          
          # Copy data files from the repository root
          echo "📂 Copying data files..."
          
          # LICENSE
          [ -f "LICENSE.md" ] && cp LICENSE.md pages-site/
          
          # wiki.json
          for src in "data/wiki.json" "misc/wiki.json"; do
            if [ -f "$src" ]; then
              cp "$src" pages-site/wiki.json
              break
            fi
          done
          
          # Regions
          for src in "data/regions" "misc/regions"; do
            if [ -d "$src" ]; then
              cp -r "$src" pages-site/regions 2>/dev/null || true
              break
            fi
          done
          
          # Factions
          for src in "data/factions" "misc/factions"; do
            if [ -d "$src" ]; then
              cp -r "$src" pages-site/factions 2>/dev/null || true
              break
            fi
          done
          
          # Patrons
          for src in "data/patrons" "misc/patrons"; do
            if [ -d "$src" ]; then
              mkdir -p pages-site/data
              cp -r "$src" pages-site/data/patrons 2>/dev/null || true
              break
            fi
          done
          
          echo "✅ Static site prepared"

      - name: Verify pages-site contents
        run: |
          echo "📂 Pages site structure:"
          echo ""
          echo "Root contents:"
          ls -la pages-site/ | head -15
          echo ""
          
          # Check for index.html
          if [ -f "pages-site/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "⚠️ WARNING: index.html not found - site may not render correctly"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: pages-site