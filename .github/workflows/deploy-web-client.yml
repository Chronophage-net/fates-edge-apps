name: Deploy Web Client to GitHub Pages

on:
  workflow_call:
    inputs:
      artifact-name:
        type: string
        required: false
        default: 'pages-site'
      skip_deploy:
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Honor skip_deploy
    if: inputs.skip_deploy != 'true'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Prepare workspace
        run: mkdir -p pages-site

      - name: Download pages artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: pages-site

      - name: Verify pages-site contents
        run: |
          echo "Root of pages-site:"
          ls -la pages-site | head -20 || true

          if [ ! -f "pages-site/index.html" ]; then
            echo "❌ ERROR: pages-site artifact is missing index.html"
            echo "Artifact '${{ inputs.artifact-name }}' may not have been uploaded by the build workflow."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: pages-site
