name: Build & Publish Docker Images

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: false
        type: string
      push:
        description: 'Push images to registry'
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: false
        type: string
      push:
        description: 'Push images to registry'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
  REGISTRY: docker.io
  IMAGE_BASE: chronophage/fates-edge

jobs:
  docker-build:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: socket-server
            context: ./utilities/javascript/fates-edge-socket-server
            dockerfile: ./utilities/javascript/fates-edge-socket-server/Dockerfile
          - name: web-client
            context: ./utilities/javascript/fates-edge-web-client
            dockerfile: ./utilities/javascript/fates-edge-web-client/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          SHA="${{ github.sha }}"
          APP="${{ matrix.app.name }}"
          TAGS="${IMAGE_BASE}:${VERSION},${IMAGE_BASE}:${APP}-${VERSION},${IMAGE_BASE}:${APP}-${SHA}"
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAGS="${TAGS},${IMAGE_BASE}:${APP}-${VERSION},${IMAGE_BASE}:${APP}-latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app.context }}
          file: ${{ matrix.app.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push == true || inputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}
          provenance: false