name: Deploy Apps

on:
  push:
    branches:
      - main
    paths:
      - 'ttrpg/utilities/javascript/**'
      - '.github/workflows/deploy-apps.yml'
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        type: choice
        options:
          - staging
          - production
        default: production
      skip_build:
        description: 'Skip build and use existing artifacts'
        type: boolean
        default: false
  repository_dispatch:
    types: [documents-updated]

env:
  NODE_VERSION: 24
  PYTHON_VERSION: 3.11

jobs:
  build-app:
    name: Build App
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Build web client
        working-directory: ttrpg/utilities/javascript/fates-edge-web-client
        run: |
          if [ -f "package.json" ]; then
            if [ -f "package-lock.json" ]; then
              npm ci
            else
              npm install
            fi
          fi
          if grep -q '"build"' package.json 2>/dev/null; then
            npm run build
          else
            echo "No build script found, using static files"
          fi

      - name: Upload web client artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-web-client-build
          path: ttrpg/utilities/javascript/fates-edge-web-client/
          retention-days: 7
          if-no-files-found: error

  fetch-documents:
    name: Fetch Documents from Docs Repository
    runs-on: ubuntu-latest
    needs: [build-app]
    steps:
      - name: Download documents artifact
        uses: actions/download-artifact@v4
        with:
          name: fates-edge-documents
          path: docs/
        continue-on-error: true

      - name: Alternative - Checkout docs repository
        if: failure()
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fates-edge-docs
          path: docs-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy documents to deploy directory
        run: |
          mkdir -p deploy/docs
          if [ -d "docs/_site/docs" ]; then
            cp -r docs/_site/docs/* deploy/docs/
          elif [ -d "docs-repo/_site/docs" ]; then
            cp -r docs-repo/_site/docs/* deploy/docs/
          else
            echo "WARNING: No documents found"
          fi

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-combined
          path: deploy/
          retention-days: 7

  deploy-app:
    name: Deploy App/Site
    runs-on: ubuntu-latest
    needs: [fetch-documents]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download combined artifact
        uses: actions/download-artifact@v4
        with:
          name: fates-edge-combined
          path: deploy/

      - name: Download web client build
        uses: actions/download-artifact@v4
        with:
          name: fates-edge-web-client-build
          path: web-client-build/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create deployment directory
        run: |
          mkdir -p deploy
          mkdir -p deploy/js/features
          mkdir -p deploy/js/core
          mkdir -p deploy/js/components
          mkdir -p deploy/css
          mkdir -p deploy/data
          mkdir -p deploy/docs

      - name: Copy web client files
        run: |
          WEB_CLIENT="web-client-build"
          if [ -f "$WEB_CLIENT/index.html" ]; then
            cp "$WEB_CLIENT/index.html" deploy/
          fi
          if [ -d "$WEB_CLIENT/css" ]; then
            cp -r "$WEB_CLIENT/css" deploy/
          fi
          if [ -d "$WEB_CLIENT/js" ]; then
            cp -r "$WEB_CLIENT/js" deploy/
          fi
          if [ -d "$WEB_CLIENT/data" ]; then
            cp -r "$WEB_CLIENT/data" deploy/
          fi
          if [ -f "$WEB_CLIENT/manifest-core.json" ]; then
            cp "$WEB_CLIENT/manifest-core.json" deploy/
          fi

      - name: Copy pre-generated CC-licensed HTML files
        run: |
          if [ -f "ttrpg/utilities/javascript/fates-edge-web-client/essentials.html" ]; then
            cp "ttrpg/utilities/javascript/fates-edge-web-client/essentials.html" deploy/docs/
          elif [ -f "web-client-build/essentials.html" ]; then
            cp "web-client-build/essentials.html" deploy/docs/
          fi
          if [ -f "ttrpg/utilities/javascript/fates-edge-web-client/fates-edge-srd-main.html" ]; then
            cp "ttrpg/utilities/javascript/fates-edge-web-client/fates-edge-srd-main.html" deploy/docs/
          elif [ -f "web-client-build/fates-edge-srd-main.html" ]; then
            cp "web-client-build/fates-edge-srd-main.html" deploy/docs/
          fi

      - name: Create search index
        run: |
          python3 << 'PYTHON'
          import json
          data = [
            {
              'id': 'essentials',
              'title': "Fate's Edge Essentials",
              'content': "The core rules for Fate's Edge. Includes character creation, core mechanics, combat, magic, and advancement.",
              'url': '/docs/essentials.html',
              'type': 'document',
              'category': 'Core'
            },
            {
              'id': 'srd',
              'title': "Fate's Edge SRD",
              'content': "The complete System Reference Document for Fate's Edge. Includes all rules, tables, and reference material.",
              'url': '/docs/fates-edge-srd-main.html',
              'type': 'document',
              'category': 'SRD'
            }
          ]
          with open('deploy/search-index.json', 'w') as f:
            json.dump(data, f, indent=2)
          PYTHON

      - name: Create feature modules
        run: |
          for feature in builder dice characters encounters vtt wiki docs search settings sync timers dashboard home decks; do
            if [ ! -d "deploy/js/features/$feature" ]; then
              mkdir -p "deploy/js/features/$feature"
              cat > "deploy/js/features/$feature/index.js" << EOF2
          export default {
            init: () => console.log('$feature module initialized'),
            render: (el) => {
              if (el) {
                el.innerHTML = '<div class="feature-placeholder"><h3>$feature</h3><p class="text-muted">Feature module placeholder</p></div>';
              }
            },
            destroy: () => console.log('$feature module destroyed')
          };
          export function render(el) {
            if (el) {
              el.innerHTML = '<div class="feature-placeholder"><h3>$feature</h3><p class="text-muted">Feature module placeholder</p></div>';
            }
          }
          export function destroy() {
            console.log('$feature module destroyed');
          }
          export function init() {
            console.log('$feature module initialized');
          }
          EOF2
          done
          if [ ! -f "deploy/js/features/docs/index.js" ]; then
            mkdir -p deploy/js/features/docs
            if [ -f "web-client-build/js/features/docs/index.js" ]; then
              cp "web-client-build/js/features/docs/index.js" deploy/js/features/docs/
            else
              cat > deploy/js/features/docs/index.js << 'EOF3'
          export default {
            render: (el) => {
              if (el) {
                el.innerHTML = '<div style="padding:1rem;"><h3 style="color:var(--gold);">Document Library</h3><p class="text-muted">Loading documents...</p></div>';
              }
            },
            destroy: () => console.log('Docs destroyed'),
            loadDocList: () => console.log('Loading docs'),
            loadDocument: (path) => console.log('Loading doc:', path)
          };
          EOF3
            fi
          fi

      - name: Create site structure
        run: |
          echo "" > deploy/.nojekyll
          python3 << 'PYTHON'
          import json
          import datetime
          data = {
            'buildTime': datetime.datetime.utcnow().isoformat() + 'Z',
            'commit': '${{ github.sha }}',
            'version': '${{ github.ref_name }}',
            'environment': '${{ github.event.inputs.deploy_env || 'production' }}',
            'type': 'app-deployment'
          }
          with open('deploy/build-info.json', 'w') as f:
            json.dump(data, f, indent=2)
          PYTHON

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-app-deploy
          path: deploy/
          retention-days: 7
          if-no-files-found: error

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [deploy-app]
    if: github.event.inputs.deploy_env == 'production'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: fates-edge-app-deploy
          path: deploy/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM nginx:alpine
          COPY deploy/ /usr/share/nginx/html/
          RUN echo 'server { \
              listen 80; \
              server_name localhost; \
              root /usr/share/nginx/html; \
              index index.html; \
              location / { \
                  try_files $uri $uri/ /index.html; \
              } \
              location /docs/ { \
                  try_files $uri $uri/ /index.html; \
              } \
              location /regions/ { \
                  try_files $uri $uri/ /index.html; \
              } \
              location ~* \.(js|css|png|jpg|jpeg|gif|ico|json|svg)$ { \
                  expires 1y; \
                  add_header Cache-Control "public, immutable"; \
              } \
          }' > /etc/nginx/conf.d/default.conf
          EXPOSE 80
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fates-edge-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/fates-edge-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [deploy-app]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: fates-edge-app-deploy
          path: deploy/

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Deploy app from ${{ github.sha }}"
          destination_dir: app
          keep_files: true
