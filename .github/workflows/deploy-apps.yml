name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'ttrpg/utilities/javascript/fates-edge-web-client/**'
      - 'ttrpg/utilities/javascript/fates-edge-socket-server/**'
      - 'ttrpg/utilities/javascript/fates-edge-desktop-client/**'
      - '.github/workflows/build-package-apps.yml'
  workflow_dispatch:
    inputs:
      skip_web_deploy:
        description: 'Skip web client deployment'
        type: boolean
        default: false
      create_release:
        description: 'Create GitHub Release with all packages'
        type: boolean
        default: false
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        type: string
        required: false

env:
  NODE_VERSION: 24
  PYTHON_VERSION: 3.11

jobs:
  # ============================================
  # WEB CLIENT - BUILD AND DEPLOY
  # ============================================
  web-client:
    name: Build and Deploy Web Client
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_web_deploy != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ttrpg/utilities/javascript/fates-edge-web-client
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build web client
        working-directory: ttrpg/utilities/javascript/fates-edge-web-client
        run: |
          if grep -q '"build"' package.json 2>/dev/null; then
            npm run build
          else
            echo "No build script found - check package.json"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ttrpg/utilities/javascript/fates-edge-web-client/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy web client from ${{ github.sha }}"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Upload web client artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-web-client
          path: ttrpg/utilities/javascript/fates-edge-web-client/dist
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # SOCKET SERVER - PACKAGE FOR DOWNLOAD
  # ============================================
  socket-server:
    name: Package Socket Server
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ttrpg/utilities/javascript/fates-edge-socket-server
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Package socket server
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-socket-server.tar.gz \
            -C ttrpg/utilities/javascript/fates-edge-socket-server \
            --exclude='node_modules' \
            --exclude='.git' \
            .
          echo "Created fates-edge-socket-server.tar.gz"

      - name: Upload socket server artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-socket-server
          path: artifacts/fates-edge-socket-server.tar.gz
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # DESKTOP CLIENT - PACKAGE FOR DOWNLOAD
  # ============================================
  desktop-client:
    name: Package Desktop Client
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ttrpg/utilities/javascript/fates-edge-desktop-client
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Package desktop client
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-desktop-client.tar.gz \
            -C ttrpg/utilities/javascript/fates-edge-desktop-client \
            --exclude='node_modules' \
            --exclude='.git' \
            .
          echo "Created fates-edge-desktop-client.tar.gz"

      - name: Upload desktop client artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-desktop-client
          path: artifacts/fates-edge-desktop-client.tar.gz
          retention-days: 30
          if-no-files-found: error

  # ============================================
  # CREATE RELEASE
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [socket-server, desktop-client]
    if: github.event.inputs.create_release == 'true' && github.event.inputs.release_version != ''
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name "*.tar.gz" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          draft: false
          prerelease: false
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}