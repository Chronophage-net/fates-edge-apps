name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ttrpg/utilities/javascript/fates-edge-web-client/**'
      - 'ttrpg/utilities/javascript/fates-edge-socket-server/**'
      - 'ttrpg/utilities/javascript/fates-edge-desktop-client/**'
      - '.github/workflows/deploy-apps.yml'

  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      create_release:
        type: boolean
        default: false
      release_version:
        type: string
        required: false

env:
  NODE_VERSION: 24

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ============================================================
  # UNIVERSAL NODE BUILD (matrix)
  # ============================================================
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: ttrpg/utilities/javascript/fates-edge-web-client
            build: false
            package: false
          - name: socket-server
            path: ttrpg/utilities/javascript/fates-edge-socket-server
            build: false
            package: true
          - name: desktop-client
            path: ttrpg/utilities/javascript/fates-edge-desktop-client
            build: false
            package: true

    # NOTE: the `matrix` context is not available in a job-level `if:`.
    # It IS available in job-level `env:`, so compute the skip flag here
    # and check it in each step's `if:` instead.
    env:
      SKIP_JOB: ${{ matrix.name == 'web-client' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true' }}

    # Needed so the "commit generated lockfile" step can push back to the repo.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        if: ${{ env.SKIP_JOB != 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ env.SKIP_JOB != 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Ensure package-lock.json exists
        id: ensure-lockfile
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json found in ${{ matrix.path }} — generating one."
            npm install --package-lock-only --ignore-scripts
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated lockfile
        if: ${{ env.SKIP_JOB != 'true' && steps.ensure-lockfile.outputs.generated == 'true' && github.event_name != 'pull_request' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: add generated package-lock.json for ${{ matrix.name }}"
          file_pattern: ${{ matrix.path }}/package-lock.json
          skip_dirty_check: false

      - name: Cache node modules
        if: ${{ env.SKIP_JOB != 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build project
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package project
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        run: |
          mkdir -p artifacts
          tar -czf artifacts/${{ matrix.name }}.tar.gz \
            -C ${{ matrix.path }} \
            --exclude=node_modules \
            --exclude=.git \
            .

      - name: Upload build artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error

      - name: Upload packaged artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: error

      - name: Prepare Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          mkdir -p pages-site
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/

      - name: Upload Pages artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  # ============================================================
  # DEPLOY TO GITHUB PAGES (Pages source = "GitHub Actions")
  # ============================================================
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: >
      !(github.event_name == 'workflow_dispatch' &&
        github.event.inputs.skip_web_deploy == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # RELEASE CREATION
  # ============================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true' &&
      github.event.inputs.release_version != ''

    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: '*-package'
          path: artifacts/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.tar.gz release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}