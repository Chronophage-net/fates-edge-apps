name: Build and Package Apps

on:
  push:
    branches:
      - main
    paths:
      - 'ttrpg/utilities/**'
      - '.github/workflows/build-package-apps.yml'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0)'
        type: string
        required: false
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

env:
  NODE_VERSION: 24
  PYTHON_VERSION: 3.11

jobs:
  build-web-client:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ttrpg/utilities/javascript/fates-edge-web-client/package-lock.json'

      - name: Build web client
        working-directory: ttrpg/utilities/javascript/fates-edge-web-client
        run: |
          if [ -f "package.json" ]; then
            if [ -f "package-lock.json" ]; then
              npm ci
            else
              npm install
            fi
          fi
          if grep -q '"build"' package.json 2>/dev/null; then
            npm run build
          else
            echo "No build script found, using static files"
          fi

      - name: Package web client
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-web-client.tar.gz -C ttrpg/utilities/javascript/fates-edge-web-client .
          echo "Created fates-edge-web-client.tar.gz"

      - name: Upload web client artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-web-client
          path: artifacts/fates-edge-web-client.tar.gz
          retention-days: 30

  build-desktop-client:
    name: Build Desktop Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ttrpg/utilities/javascript/fates-edge-desktop-client/package-lock.json'

      - name: Install dependencies
        working-directory: ttrpg/utilities/javascript/fates-edge-desktop-client
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Package desktop client
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-desktop-client.tar.gz -C ttrpg/utilities/javascript/fates-edge-desktop-client .
          echo "Created fates-edge-desktop-client.tar.gz"

      - name: Upload desktop client artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-desktop-client
          path: artifacts/fates-edge-desktop-client.tar.gz
          retention-days: 30

  build-socket-server:
    name: Build Socket Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ttrpg/utilities/javascript/fates-edge-socket-server/package-lock.json'

      - name: Install dependencies
        working-directory: ttrpg/utilities/javascript/fates-edge-socket-server
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Package socket server
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-socket-server.tar.gz -C ttrpg/utilities/javascript/fates-edge-socket-server .
          echo "Created fates-edge-socket-server.tar.gz"

      - name: Upload socket server artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-socket-server
          path: artifacts/fates-edge-socket-server.tar.gz
          retention-days: 30

  build-discord-bot:
    name: Build Discord Bot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'ttrpg/utilities/fates-edge-discord-bot/package-lock.json'

      - name: Install dependencies
        working-directory: ttrpg/utilities/fates-edge-discord-bot
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Package Discord bot
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-discord-bot.tar.gz -C ttrpg/utilities/fates-edge-discord-bot .
          echo "Created fates-edge-discord-bot.tar.gz"

      - name: Upload Discord bot artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-discord-bot
          path: artifacts/fates-edge-discord-bot.tar.gz
          retention-days: 30

  package-roll20:
    name: Package Roll20 Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Roll20 integration
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-roll20.tar.gz -C ttrpg/utilities/fates-edge-roll20 .
          echo "Created fates-edge-roll20.tar.gz"

      - name: Upload Roll20 artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-roll20
          path: artifacts/fates-edge-roll20.tar.gz
          retention-days: 30

  package-foundry-bridge:
    name: Package Foundry VTT Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Foundry VTT bridge
        run: |
          mkdir -p artifacts
          tar -czf artifacts/foundry-fates-edge-bridge.tar.gz -C ttrpg/utilities/foundry_fates-edge-bridge .
          echo "Created foundry-fates-edge-bridge.tar.gz"

      - name: Upload Foundry bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-fates-edge-bridge
          path: artifacts/foundry-fates-edge-bridge.tar.gz
          retention-days: 30

  build-python-client:
    name: Build Python Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build Python client package
        working-directory: ttrpg/utilities/python/fates-edge-python-client
        run: |
          python -m build --sdist --wheel

      - name: Package Python client
        run: |
          mkdir -p artifacts
          cp ttrpg/utilities/python/fates-edge-python-client/dist/*.tar.gz artifacts/fates-edge-python-client.tar.gz 2>/dev/null || true
          cp ttrpg/utilities/python/fates-edge-python-client/dist/*.whl artifacts/ 2>/dev/null || true
          echo "Created Python client packages"

      - name: Upload Python client artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-python-client
          path: artifacts/
          retention-days: 30

  package-python-tool:
    name: Package Python CLI Tool
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Python CLI tool
        run: |
          mkdir -p artifacts
          tar -czf artifacts/fates-edge-python-tool.tar.gz -C ttrpg/utilities/python/fates_edge_tool .
          echo "Created fates-edge-python-tool.tar.gz"

      - name: Upload Python tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-python-tool
          path: artifacts/fates-edge-python-tool.tar.gz
          retention-days: 30

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-web-client
      - build-desktop-client
      - build-socket-server
      - build-discord-bot
      - package-roll20
      - package-foundry-bridge
      - build-python-client
      - package-python-tool
    if: github.event.inputs.create_release == 'true' || github.ref == 'refs/heads/main'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release assets directory
        run: |
          mkdir -p release-assets
          # Find and copy all tarballs and wheels
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.whl" \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums.txt
          echo "Checksums generated:"
          cat checksums.txt

      - name: Create combined release tarball
        run: |
          tar -czf fates-edge-apps-all.tar.gz -C release-assets .
          echo "Created fates-edge-apps-all.tar.gz"

      - name: Upload combined release artifact
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-apps-all
          path: fates-edge-apps-all.tar.gz
          retention-days: 30

      - name: Upload individual release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fates-edge-release-assets
          path: release-assets/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event.inputs.create_release == 'true' && github.event.inputs.release_version != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          draft: false
          prerelease: false
          files: |
            release-assets/*.tar.gz
            release-assets/*.whl
            release-assets/checksums.txt
            fates-edge-apps-all.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}