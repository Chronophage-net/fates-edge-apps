name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'utilities/javascript/fates-edge-web-client/**'
      - 'utilities/javascript/fates-edge-socket-server/**'
      - 'utilities/javascript/fates-edge-desktop-client/**'
      - 'utilities/vtt_mods_bots/**'
      - 'misc/**'
      - '.github/workflows/deploy-apps.yml'

  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      create_release:
        type: boolean
        default: false
      release_version:
        type: string
        required: false

env:
  NODE_VERSION: 24

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ============================================================
  # UNIVERSAL NODE BUILD (matrix)
  # ============================================================
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            build: false
            package: false
          - name: socket-server
            path: utilities/javascript/fates-edge-socket-server
            build: false
            package: true
          - name: desktop-client
            path: utilities/javascript/fates-edge-desktop-client
            build: false
            package: true
          - name: discord-bot
            path: utilities/vtt_mods_bots/fates-edge-discord-bot
            build: false
            package: true
          - name: roll20
            path: utilities/vtt_mods_bots/fates-edge-roll20
            build: false
            package: true
          - name: foundry-bridge
            path: utilities/vtt_mods_bots/foundry_fates-edge-bridge
            build: false
            package: true

    env:
      SKIP_JOB: ${{ matrix.name == 'web-client' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        if: ${{ env.SKIP_JOB != 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ env.SKIP_JOB != 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Ensure package-lock.json exists
        id: ensure-lockfile
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json found in ${{ matrix.path }} — generating one."
            npm install --package-lock-only --ignore-scripts
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated lockfile
        if: ${{ env.SKIP_JOB != 'true' && steps.ensure-lockfile.outputs.generated == 'true' && github.event_name != 'pull_request' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: add generated package-lock.json for ${{ matrix.name }}"
          file_pattern: ${{ matrix.path }}/package-lock.json
          skip_dirty_check: false

      - name: Cache node modules
        if: ${{ env.SKIP_JOB != 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build project
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package project
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        run: |
          mkdir -p artifacts
          
          # Copy LICENSE.md to the package root
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md ${{ matrix.path }}/LICENSE.md
            echo "✅ Copied LICENSE.md to ${{ matrix.path }}/"
          fi
          
          tar -czf artifacts/${{ matrix.name }}.tar.gz \
            -C ${{ matrix.path }} \
            --exclude=node_modules \
            --exclude=.git \
            .

      - name: Upload build artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error

      - name: Upload packaged artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: error

      - name: Prepare Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          mkdir -p pages-site
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/

      - name: Copy data files to Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Copying data files to Pages site..."
          
          # Copy LICENSE.md to the web site
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md pages-site/LICENSE.md
            echo "✅ Copied LICENSE.md to pages-site/"
          fi
          
          # Determine the project root (where the workflow is triggered from)
          PROJECT_ROOT="."
          
          # ============================================================
          # WIKI.JSON — goes at site root
          # ============================================================
          if [ -f "${PROJECT_ROOT}/misc/wiki.json" ]; then
            cp "${PROJECT_ROOT}/misc/wiki.json" pages-site/wiki.json
            echo "✅ Copied misc/wiki.json → pages-site/wiki.json"
          elif [ -f "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/wiki.json" ]; then
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/wiki.json" pages-site/wiki.json
            echo "✅ Copied web-client/wiki.json → pages-site/wiki.json"
          else
            echo "⚠️ No wiki.json found"
            echo '{"title": "Fate\'s Edge Wiki", "pages": []}' > pages-site/wiki.json
          fi
          
          # ============================================================
          # REGION FILES — go in /regions/
          # Used by: Decks module
          # ============================================================
          mkdir -p pages-site/regions
          
          # Copy from socket-server/data/regions/ (primary source for server data)
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/regions" ]; then
            echo "📁 Copying from socket-server/data/regions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/regions"/*.json pages-site/regions/ 2>/dev/null || true
            echo "✅ Copied socket-server/data/regions/ → pages-site/regions/"
          fi
          
          # Copy from misc/regions/ (fallback)
          if [ -d "${PROJECT_ROOT}/misc/regions" ]; then
            echo "📁 Copying from misc/regions/ directory..."
            cp "${PROJECT_ROOT}/misc/regions"/*.json pages-site/regions/ 2>/dev/null || true
            echo "✅ Copied misc/regions/ → pages-site/regions/"
          fi
          
          # Also check web-client/regions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/regions" ]; then
            echo "📁 Copying from web-client/regions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/regions"/*.json pages-site/regions/ 2>/dev/null || true
            echo "✅ Copied web-client/regions/ → pages-site/regions/"
          fi
          
          # Check data/regions/ as fallback
          if [ -d "${PROJECT_ROOT}/data/regions" ]; then
            echo "📁 Copying from data/regions/ directory..."
            cp "${PROJECT_ROOT}/data/regions"/*.json pages-site/regions/ 2>/dev/null || true
            echo "✅ Copied data/regions/ → pages-site/regions/"
          fi
          
          # Ensure manifest exists
          if [ ! -f pages-site/regions/manifest.json ]; then
            echo "📝 Generating region manifest.json..."
            REGION_MANIFEST="["
            first=true
            for file in pages-site/regions/*.json; do
              if [ -f "$file" ] && [ "$(basename "$file")" != "manifest.json" ]; then
                name=$(basename "$file" .json)
                if [ "$first" = true ]; then
                  REGION_MANIFEST="${REGION_MANIFEST}\"${name}\""
                  first=false
                else
                  REGION_MANIFEST="${REGION_MANIFEST}, \"${name}\""
                fi
              fi
            done
            REGION_MANIFEST="${REGION_MANIFEST}]"
            
            if [ "$REGION_MANIFEST" = "[]" ]; then
              if [ -f pages-site/regions/acasia.json ]; then
                REGION_MANIFEST='["acasia"]'
              else
                echo '{"name":"Acasia","slug":"acasia","description":"The shattered continent"}' > pages-site/regions/acasia.json
                REGION_MANIFEST='["acasia"]'
              fi
            fi
            
            echo "$REGION_MANIFEST" > pages-site/regions/manifest.json
            echo "✅ Generated region manifest.json: $REGION_MANIFEST"
          fi
          
          # ============================================================
          # FACTION FILES — go in /factions/
          # Used by: Factions module
          # ============================================================
          mkdir -p pages-site/factions
          
          # Copy from misc/factions/ (primary source)
          if [ -d "${PROJECT_ROOT}/misc/factions" ]; then
            echo "📁 Copying from misc/factions/ directory..."
            cp "${PROJECT_ROOT}/misc/factions"/*.json pages-site/factions/ 2>/dev/null || true
            echo "✅ Copied misc/factions/ → pages-site/factions/"
          fi
          
          # Also check web-client/factions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/factions" ]; then
            echo "📁 Copying from web-client/factions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/factions"/*.json pages-site/factions/ 2>/dev/null || true
            echo "✅ Copied web-client/factions/ → pages-site/factions/"
          fi
          
          # Check data/factions/ as fallback
          if [ -d "${PROJECT_ROOT}/data/factions" ]; then
            echo "📁 Copying from data/factions/ directory..."
            cp "${PROJECT_ROOT}/data/factions"/*.json pages-site/factions/ 2>/dev/null || true
            echo "✅ Copied data/factions/ → pages-site/factions/"
          fi
          
          # Also check web-client/data/factions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/factions" ]; then
            echo "📁 Copying from web-client/data/factions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/factions"/*.json pages-site/factions/ 2>/dev/null || true
            echo "✅ Copied web-client/data/factions/ → pages-site/factions/"
          fi
          
          # Rename factions-manifest.json to manifest.json if needed
          if [ -f pages-site/factions/factions-manifest.json ] && [ ! -f pages-site/factions/manifest.json ]; then
            mv pages-site/factions/factions-manifest.json pages-site/factions/manifest.json
            echo "✅ Renamed factions-manifest.json → manifest.json"
          fi
          
          # Ensure manifest exists
          if [ ! -f pages-site/factions/manifest.json ]; then
            echo "📝 Generating faction manifest.json..."
            FACTION_MANIFEST="["
            first=true
            for file in pages-site/factions/*.json; do
              if [ -f "$file" ] && [ "$(basename "$file")" != "manifest.json" ]; then
                name=$(basename "$file" .json)
                if [ "$first" = true ]; then
                  FACTION_MANIFEST="${FACTION_MANIFEST}\"${name}\""
                  first=false
                else
                  FACTION_MANIFEST="${FACTION_MANIFEST}, \"${name}\""
                fi
              fi
            done
            FACTION_MANIFEST="${FACTION_MANIFEST}]"
            
            if [ "$FACTION_MANIFEST" = "[]" ]; then
              FACTION_MANIFEST='["bloody-fist", "ecktorian-censorate", "gray-ash", "house-contarini", "iron-league", "velvet-court"]'
            fi
            
            echo "$FACTION_MANIFEST" > pages-site/factions/manifest.json
            echo "✅ Generated faction manifest.json: $FACTION_MANIFEST"
          fi
          
          # ============================================================
          # PATRON FILES — go in /data/patrons/
          # Used by: Patrons module
          # ============================================================
          mkdir -p pages-site/data/patrons
          
          # Copy from socket-server/data/patrons/ (primary source)
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/patrons" ]; then
            echo "📁 Copying from socket-server/data/patrons/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/patrons"/*.json pages-site/data/patrons/ 2>/dev/null || true
            echo "✅ Copied socket-server/data/patrons/ → pages-site/data/patrons/"
          fi
          
          # Copy from misc/ (fallback)
          if [ -f "${PROJECT_ROOT}/misc/the_traveler.json" ]; then
            cp "${PROJECT_ROOT}/misc/the_traveler.json" pages-site/data/patrons/traveler.json
            echo "✅ Copied misc/the_traveler.json → pages-site/data/patrons/traveler.json"
          fi
          
          if [ -f "${PROJECT_ROOT}/misc/acasia.json" ]; then
            cp "${PROJECT_ROOT}/misc/acasia.json" pages-site/data/patrons/acasia.json
            echo "✅ Copied misc/acasia.json → pages-site/data/patrons/acasia.json"
          fi
          
          # Also check web-client/data/patrons/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/patrons" ]; then
            echo "📁 Copying from web-client/data/patrons/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/patrons"/*.json pages-site/data/patrons/ 2>/dev/null || true
            echo "✅ Copied web-client/data/patrons/ → pages-site/data/patrons/"
          fi
          
          # Generate patron manifest
          echo "📝 Generating patron manifest.json..."
          PATRON_MANIFEST="["
          first=true
          for file in pages-site/data/patrons/*.json; do
            if [ -f "$file" ] && [ "$(basename "$file")" != "manifest.json" ]; then
              name=$(basename "$file" .json)
              if [ "$first" = true ]; then
                PATRON_MANIFEST="${PATRON_MANIFEST}\"${name}\""
                first=false
              else
                PATRON_MANIFEST="${PATRON_MANIFEST}, \"${name}\""
              fi
            fi
          done
          PATRON_MANIFEST="${PATRON_MANIFEST}]"
          
          if [ "$PATRON_MANIFEST" = "[]" ]; then
            if [ -f pages-site/data/patrons/traveler.json ]; then
              PATRON_MANIFEST='["traveler"]'
            else
              echo '{"id":"traveler","name":"The Traveler","description":"A mysterious wanderer"}' > pages-site/data/patrons/traveler.json
              PATRON_MANIFEST='["traveler"]'
            fi
          fi
          
          echo "$PATRON_MANIFEST" > pages-site/data/patrons/manifest.json
          echo "✅ Generated patron manifest.json: $PATRON_MANIFEST"
          
          # ============================================================
          # BACKUP COPIES
          # ============================================================
          mkdir -p pages-site/data
          mkdir -p pages-site/data/regions
          mkdir -p pages-site/data/factions
          
          # Copy region files to data/regions as backup
          if [ -d pages-site/regions ]; then
            cp pages-site/regions/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied regions to data/regions/ as backup"
          fi
          
          # Copy wiki.json to data/ as backup
          if [ -f pages-site/wiki.json ]; then
            cp pages-site/wiki.json pages-site/data/wiki.json
            echo "✅ Copied wiki.json to data/ as backup"
          fi
          
          # Copy factions to data/factions as backup
          if [ -d pages-site/factions ]; then
            cp pages-site/factions/*.json pages-site/data/factions/ 2>/dev/null || true
            echo "✅ Copied factions to data/factions/ as backup"
          fi
          
          # ============================================================
          # PACK.JSON — for pack management
          # ============================================================
          if [ -f "${PROJECT_ROOT}/misc/pack.json" ]; then
            mkdir -p pages-site/misc
            cp "${PROJECT_ROOT}/misc/pack.json" pages-site/misc/pack.json
            echo "✅ Copied misc/pack.json → pages-site/misc/pack.json"
          fi
          
          # ============================================================
          # DEBUG OUTPUT
          # ============================================================
          echo ""
          echo "📂 Site root contents:"
          ls -la pages-site/ | head -20
          echo ""
          echo "📂 Regions directory contents:"
          ls -la pages-site/regions/ || echo "  (empty)"
          echo ""
          echo "📂 Factions directory contents:"
          ls -la pages-site/factions/ || echo "  (empty)"
          echo ""
          echo "📂 Data directory contents:"
          ls -la pages-site/data/ || echo "  (empty)"
          echo ""
          echo "📂 Data/regions directory contents:"
          ls -la pages-site/data/regions/ || echo "  (empty)"
          echo ""
          echo "📂 Data/patrons directory contents:"
          ls -la pages-site/data/patrons/ || echo "  (empty)"
          echo ""
          echo "📂 Data/factions directory contents:"
          ls -la pages-site/data/factions/ || echo "  (empty)"
          echo ""
          echo "📂 Misc directory contents:"
          ls -la pages-site/misc/ || echo "  (empty)"

      - name: Upload Pages artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  # ============================================================
  # DEPLOY TO GITHUB PAGES
  # ============================================================
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: >
      !(github.event_name == 'workflow_dispatch' &&
        github.event.inputs.skip_web_deploy == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # RELEASE CREATION
  # ============================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true' &&
      github.event.inputs.release_version != ''

    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: '*-package'
          path: artifacts/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.tar.gz release-assets/
          
          # Copy LICENSE.md to release assets
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md release-assets/LICENSE.md
            echo "✅ Copied LICENSE.md to release assets"
          fi

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
            release-assets/LICENSE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
