name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ttrpg/utilities/javascript/fates-edge-web-client/**'
      - 'ttrpg/utilities/javascript/fates-edge-socket-server/**'
      - 'ttrpg/utilities/javascript/fates-edge-desktop-client/**'
      - '.github/workflows/build-package-apps.yml'

  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      create_release:
        type: boolean
        default: false
      release_version:
        type: string
        required: false

env:
  NODE_VERSION: 24

jobs:
  # ============================================================
  # UNIVERSAL NODE BUILD (matrix)
  # ============================================================
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Web client — only included when allowed
          - name: web-client
            path: ttrpg/utilities/javascript/fates-edge-web-client
            build: true
            deploy: true
            skip_condition: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true' }}

          # Socket server
          - name: socket-server
            path: ttrpg/utilities/javascript/fates-edge-socket-server
            build: false
            deploy: false
            skip_condition: false

          # Desktop client
          - name: desktop-client
            path: ttrpg/utilities/javascript/fates-edge-desktop-client
            build: false
            deploy: false
            skip_condition: false

    # FIX: job-level condition no longer references matrix.*
    if: ${{ matrix.skip_condition != true }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build project
        if: ${{ matrix.build }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package project
        if: ${{ matrix.name != 'web-client' }}
        run: |
          mkdir -p artifacts
          tar -czf artifacts/${{ matrix.name }}.tar.gz \
            -C ${{ matrix.path }} \
            --exclude=node_modules \
            --exclude=.git \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.path }}/dist
            artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: ignore

      - name: Deploy Web Client
        if: ${{ matrix.deploy }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ${{ matrix.path }}/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy web client from ${{ github.sha }}"

  # ============================================================
  # RELEASE CREATION
  # ============================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true' &&
      github.event.inputs.release_version != ''

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/**/*.tar.gz release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
