name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ttrpg/utilities/javascript/fates-edge-web-client/**'
      - 'ttrpg/utilities/javascript/fates-edge-socket-server/**'
      - 'ttrpg/utilities/javascript/fates-edge-desktop-client/**'
      - 'ttrpg/utilities/javascript/data/**'
      - 'misc/**'
      - '.github/workflows/deploy-apps.yml'

  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      create_release:
        type: boolean
        default: false
      release_version:
        type: string
        required: false

env:
  NODE_VERSION: 24

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ============================================================
  # UNIVERSAL NODE BUILD (matrix)
  # ============================================================
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: ttrpg/utilities/javascript/fates-edge-web-client
            build: false
            package: false
          - name: socket-server
            path: ttrpg/utilities/javascript/fates-edge-socket-server
            build: false
            package: true
          - name: desktop-client
            path: ttrpg/utilities/javascript/fates-edge-desktop-client
            build: false
            package: true

    env:
      SKIP_JOB: ${{ matrix.name == 'web-client' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        if: ${{ env.SKIP_JOB != 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ env.SKIP_JOB != 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Ensure package-lock.json exists
        id: ensure-lockfile
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json found in ${{ matrix.path }} — generating one."
            npm install --package-lock-only --ignore-scripts
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated lockfile
        if: ${{ env.SKIP_JOB != 'true' && steps.ensure-lockfile.outputs.generated == 'true' && github.event_name != 'pull_request' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: add generated package-lock.json for ${{ matrix.name }}"
          file_pattern: ${{ matrix.path }}/package-lock.json
          skip_dirty_check: false

      - name: Cache node modules
        if: ${{ env.SKIP_JOB != 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build project
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package project
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        run: |
          mkdir -p artifacts
          tar -czf artifacts/${{ matrix.name }}.tar.gz \
            -C ${{ matrix.path }} \
            --exclude=node_modules \
            --exclude=.git \
            .

      - name: Upload build artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error

      - name: Upload packaged artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: error

      - name: Prepare Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          mkdir -p pages-site
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/

      - name: Copy data files to Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Copying data files to Pages site..."
          
          # === WIKI.JSON — goes at site root ===
          # The wiki feature loads from 'wiki.json' (relative to site root)
          # So copy it to pages-site/wiki.json
          if [ -f misc/wiki.json ]; then
            cp misc/wiki.json pages-site/wiki.json
            echo "✅ Copied misc/wiki.json → pages-site/wiki.json"
          elif [ -f ttrpg/utilities/javascript/data/wiki.json ]; then
            cp ttrpg/utilities/javascript/data/wiki.json pages-site/wiki.json
            echo "✅ Copied ttrpg/utilities/javascript/data/wiki.json → pages-site/wiki.json"
          else
            echo "⚠️ No wiki.json found in misc/ or data/"
          fi
          
          # === REGION FILES — go in /regions/ directory ===
          # The consequences feature loads from '/regions/manifest.json' and '/regions/{slug}.json'
          mkdir -p pages-site/regions
          
          # acasia.json
          if [ -f misc/acasia.json ]; then
            cp misc/acasia.json pages-site/regions/acasia.json
            echo "✅ Copied misc/acasia.json → pages-site/regions/acasia.json"
          elif [ -f ttrpg/utilities/javascript/data/regions/acasia.json ]; then
            cp ttrpg/utilities/javascript/data/regions/acasia.json pages-site/regions/acasia.json
            echo "✅ Copied ttrpg/utilities/javascript/data/regions/acasia.json → pages-site/regions/acasia.json"
          else
            echo "⚠️ No acasia.json found"
          fi
          
          # the_traveler.json
          if [ -f misc/the_traveler.json ]; then
            cp misc/the_traveler.json pages-site/regions/the_traveler.json
            echo "✅ Copied misc/the_traveler.json → pages-site/regions/the_traveler.json"
          elif [ -f ttrpg/utilities/javascript/data/regions/the_traveler.json ]; then
            cp ttrpg/utilities/javascript/data/regions/the_traveler.json pages-site/regions/the_traveler.json
            echo "✅ Copied ttrpg/utilities/javascript/data/regions/the_traveler.json → pages-site/regions/the_traveler.json"
          else
            echo "⚠️ No the_traveler.json found"
          fi
          
          # Generate manifest.json from the region files we have
          echo "📝 Generating manifest.json..."
          MANIFEST='[]'
          if [ -f pages-site/regions/acasia.json ]; then
            MANIFEST='["acasia"]'
          elif [ -f pages-site/regions/the_traveler.json ] && [ "$MANIFEST" = '[]' ]; then
            MANIFEST='["the_traveler"]'
          elif [ -f pages-site/regions/acasia.json ] && [ -f pages-site/regions/the_traveler.json ]; then
            MANIFEST='["acasia", "the_traveler"]'
          fi
          echo "$MANIFEST" > pages-site/regions/manifest.json
          echo "✅ Generated manifest.json: $MANIFEST"
          
          # Also copy region files from the standard data/regions directory if they exist
          if [ -d ttrpg/utilities/javascript/data/regions ]; then
            echo "📁 Checking standard data/regions directory..."
            find ttrpg/utilities/javascript/data/regions -name "*.json" ! -name "manifest.json" | while read -r file; do
              filename=$(basename "$file")
              # Skip if we already copied from misc
              if [ ! -f "pages-site/regions/$filename" ]; then
                cp "$file" "pages-site/regions/$filename"
                echo "  ✅ Copied $filename from standard location"
              fi
            done
            # Also copy manifest if it exists and we haven't generated one
            if [ -f ttrpg/utilities/javascript/data/regions/manifest.json ] && [ ! -f pages-site/regions/manifest.json ]; then
              cp ttrpg/utilities/javascript/data/regions/manifest.json pages-site/regions/manifest.json
              echo "✅ Copied manifest.json from standard location"
            fi
          fi
          
          # === DATA DIRECTORY (for other JSON files) ===
          # Some features might expect data files in /data/
          mkdir -p pages-site/data
          if [ -f misc/wiki.json ]; then
            cp misc/wiki.json pages-site/data/wiki.json
            echo "✅ Copied wiki.json to pages-site/data/wiki.json (backup location)"
          fi
          
          if [ -f misc/acasia.json ]; then
            cp misc/acasia.json pages-site/data/acasia.json
            echo "✅ Copied acasia.json to pages-site/data/acasia.json (backup location)"
          fi
          
          if [ -f misc/the_traveler.json ]; then
            cp misc/the_traveler.json pages-site/data/the_traveler.json
            echo "✅ Copied the_traveler.json to pages-site/data/the_traveler.json (backup location)"
          fi
          
          # List the contents for debugging
          echo ""
          echo "📂 Site root contents:"
          ls -la pages-site/ | head -20
          echo ""
          echo "📂 Regions directory contents:"
          ls -la pages-site/regions/ || echo "  (empty)"
          echo ""
          echo "📂 Data directory contents:"
          ls -la pages-site/data/ || echo "  (empty)"

      - name: Upload Pages artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  # ============================================================
  # DEPLOY TO GITHUB PAGES
  # ============================================================
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: >
      !(github.event_name == 'workflow_dispatch' &&
        github.event.inputs.skip_web_deploy == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # RELEASE CREATION
  # ============================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true' &&
      github.event.inputs.release_version != ''

    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: '*-package'
          path: artifacts/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.tar.gz release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}