name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'utilities/javascript/fates-edge-web-client/**'
      - 'utilities/javascript/fates-edge-socket-server/**'
      - 'utilities/javascript/fates-edge-desktop-client/**'
      - 'utilities/vtt_mods_bots/**'
      - 'misc/**'
      - 'data/**'
      - '.github/workflows/deploy-apps.yml'

  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      create_release:
        type: boolean
        default: false
      release_version:
        type: string
        required: false

env:
  NODE_VERSION: 24

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ============================================================
  # UNIVERSAL NODE BUILD (matrix)
  # ============================================================
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            build: false
            package: false
          - name: socket-server
            path: utilities/javascript/fates-edge-socket-server
            build: false
            package: true
          - name: desktop-client
            path: utilities/javascript/fates-edge-desktop-client
            build: false
            package: true
          - name: discord-bot
            path: utilities/vtt_mods_bots/fates-edge-discord-bot
            build: false
            package: true
          - name: roll20
            path: utilities/vtt_mods_bots/fates-edge-roll20
            build: false
            package: true
          - name: foundry-bridge
            path: utilities/vtt_mods_bots/foundry_fates-edge-bridge
            build: false
            package: true

    env:
      SKIP_JOB: ${{ matrix.name == 'web-client' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        if: ${{ env.SKIP_JOB != 'true' }}

      - uses: actions/setup-node@v6
        if: ${{ env.SKIP_JOB != 'true' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Ensure package-lock.json exists
        id: ensure-lockfile
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json found in ${{ matrix.path }} — generating one."
            npm install --package-lock-only --ignore-scripts
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated lockfile
        if: ${{ env.SKIP_JOB != 'true' && steps.ensure-lockfile.outputs.generated == 'true' && github.event_name != 'pull_request' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: add generated package-lock.json for ${{ matrix.name }}"
          file_pattern: ${{ matrix.path }}/package-lock.json
          skip_dirty_check: false

      - name: Cache node modules
        if: ${{ env.SKIP_JOB != 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies
        if: ${{ env.SKIP_JOB != 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      # ============================================================
      # GENERATE DETERMINISTIC SEED
      # ============================================================
      - name: Generate deterministic seed
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        working-directory: ${{ matrix.path }}
        run: |
          echo "🎲 Generating deterministic seed for static site..."
          if [ -f js/tools/generate-seed.js ]; then
            node js/tools/generate-seed.js --force --output=.seed/random-seed.json
            echo "✅ Seed generated"
            
            # Also copy seed to data directory for fallback
            mkdir -p data
            cp .seed/random-seed.json data/seed.json 2>/dev/null || true
            cp .seed/seed.js js/seed.js 2>/dev/null || true
          else
            echo "⚠️ generate-seed.js not found, skipping seed generation"
          fi

      - name: Build project
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package project
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        run: |
          mkdir -p artifacts
          
          # Copy LICENSE.md to the package root
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md ${{ matrix.path }}/LICENSE.md
            echo "✅ Copied LICENSE.md to ${{ matrix.path }}/"
          fi
          
          tar -czf artifacts/${{ matrix.name }}.tar.gz \
            -C ${{ matrix.path }} \
            --exclude=node_modules \
            --exclude=.git \
            .

      - name: Upload build artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error

      - name: Upload packaged artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: error

      # ============================================================
      # SAVE BUILD METADATA FOR SOCKET SERVER
      # ============================================================
      - name: Save build metadata
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'socket-server' }}
        run: |
          mkdir -p build-metadata
          echo "${{ github.sha }}" > build-metadata/commit-sha.txt
          echo "${{ github.run_id }}" > build-metadata/run-id.txt
          echo "${{ github.run_number }}" > build-metadata/run-number.txt
          echo "Build timestamp: $(date -u)" > build-metadata/build-time.txt
          echo "✅ Build metadata saved for socket-server"

      - name: Upload build metadata
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'socket-server' }}
        uses: actions/upload-artifact@v6
        with:
          name: build-metadata-socket-server
          path: build-metadata/
          retention-days: 1

      # ============================================================
      # PREPARE PAGES SITE WITH SEED FILES
      # ============================================================
      - name: Prepare Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          mkdir -p pages-site
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/
          
          # Ensure seed files are included
          echo "📦 Including seed files..."
          mkdir -p pages-site/.seed
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/.seed/
            echo "✅ Copied seed to pages-site/.seed/"
          fi
          if [ -f "${{ matrix.path }}/.seed/seed.js" ]; then
            cp "${{ matrix.path }}/.seed/seed.js" pages-site/.seed/
            echo "✅ Copied seed.js to pages-site/.seed/"
          fi
          
          # Also copy to data/ for fallback
          mkdir -p pages-site/data
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/data/seed.json
            echo "✅ Copied seed to pages-site/data/seed.json"
          fi

      # ============================================================
      # COPY DATA FILES TO PAGES SITE
      # ============================================================
      - name: Copy data files to Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Copying data files to Pages site..."
          
          # Copy LICENSE.md to the web site
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md pages-site/LICENSE.md
            echo "✅ Copied LICENSE.md to pages-site/"
          fi
          
          # Determine the project root
          PROJECT_ROOT="."
          
          # ============================================================
          # WIKI.JSON — from data/
          # ============================================================
          echo "📄 Processing wiki.json..."
          WIKI_COPIED=false
          
          # Primary source: data/wiki.json
          if [ -f "${PROJECT_ROOT}/data/wiki.json" ]; then
            cp "${PROJECT_ROOT}/data/wiki.json" pages-site/wiki.json
            cp "${PROJECT_ROOT}/data/wiki.json" pages-site/data/wiki.json
            echo "✅ Copied data/wiki.json → pages-site/wiki.json and pages-site/data/wiki.json"
            WIKI_COPIED=true
          fi
          
          # Fallback: misc/wiki.json
          if [ "$WIKI_COPIED" = false ] && [ -f "${PROJECT_ROOT}/misc/wiki.json" ]; then
            cp "${PROJECT_ROOT}/misc/wiki.json" pages-site/wiki.json
            cp "${PROJECT_ROOT}/misc/wiki.json" pages-site/data/wiki.json
            echo "✅ Copied misc/wiki.json → pages-site/wiki.json"
            WIKI_COPIED=true
          fi
          
          # Fallback: web-client/data/wiki.json
          if [ "$WIKI_COPIED" = false ] && [ -f "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/wiki.json" ]; then
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/wiki.json" pages-site/wiki.json
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/wiki.json" pages-site/data/wiki.json
            echo "✅ Copied web-client/data/wiki.json → pages-site/wiki.json"
            WIKI_COPIED=true
          fi
          
          # Fallback: web-client/wiki.json
          if [ "$WIKI_COPIED" = false ] && [ -f "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/wiki.json" ]; then
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/wiki.json" pages-site/wiki.json
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/wiki.json" pages-site/data/wiki.json
            echo "✅ Copied web-client/wiki.json → pages-site/wiki.json"
            WIKI_COPIED=true
          fi
          
          # If still not found, create a minimal wiki
          if [ "$WIKI_COPIED" = false ]; then
            echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/wiki.json
            echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/data/wiki.json
            echo "⚠️ No wiki.json found, created minimal version"
          fi
          
          # ============================================================
          # REGION FILES — from data/regions/
          # ============================================================
          echo "🗺️ Processing region files..."
          mkdir -p pages-site/regions
          mkdir -p pages-site/data/regions
          
          REGION_COPIED=false
          
          # Primary source: data/regions/
          if [ -d "${PROJECT_ROOT}/data/regions" ]; then
            echo "📁 Copying from data/regions/ directory..."
            cp "${PROJECT_ROOT}/data/regions"/*.json pages-site/regions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/data/regions"/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied data/regions/ → pages-site/regions/ and pages-site/data/regions/"
            REGION_COPIED=true
          fi
          
          # Fallback: misc/regions/
          if [ "$REGION_COPIED" = false ] && [ -d "${PROJECT_ROOT}/misc/regions" ]; then
            echo "📁 Copying from misc/regions/ directory..."
            cp "${PROJECT_ROOT}/misc/regions"/*.json pages-site/regions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/misc/regions"/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied misc/regions/ → pages-site/regions/"
            REGION_COPIED=true
          fi
          
          # Fallback: socket-server/data/regions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/regions" ]; then
            echo "📁 Copying from socket-server/data/regions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/regions"/*.json pages-site/regions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/regions"/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied socket-server/data/regions/ → pages-site/regions/"
            REGION_COPIED=true
          fi
          
          # Fallback: web-client/data/regions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/regions" ]; then
            echo "📁 Copying from web-client/data/regions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/regions"/*.json pages-site/regions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/regions"/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied web-client/data/regions/ → pages-site/regions/"
            REGION_COPIED=true
          fi
          
          # Fallback: web-client/regions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/regions" ]; then
            echo "📁 Copying from web-client/regions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/regions"/*.json pages-site/regions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/regions"/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied web-client/regions/ → pages-site/regions/"
            REGION_COPIED=true
          fi
          
          # Generate manifest if needed
          echo "📝 Generating region manifest.json..."
          REGION_MANIFEST="["
          first=true
          for file in pages-site/regions/*.json; do
            if [ -f "$file" ] && [ "$(basename "$file")" != "manifest.json" ]; then
              name=$(basename "$file" .json)
              if [ "$first" = true ]; then
                REGION_MANIFEST="${REGION_MANIFEST}\"${name}\""
                first=false
              else
                REGION_MANIFEST="${REGION_MANIFEST}, \"${name}\""
              fi
            fi
          done
          REGION_MANIFEST="${REGION_MANIFEST}]"
          
          if [ "$REGION_MANIFEST" = "[]" ]; then
            if [ -f pages-site/regions/acasia.json ]; then
              REGION_MANIFEST='["acasia"]'
            else
              echo '{"name":"Acasia","slug":"acasia","description":"The shattered continent","spades":[],"hearts":[],"clubs":[],"diamonds":[]}' > pages-site/regions/acasia.json
              echo '{"name":"Acasia","slug":"acasia","description":"The shattered continent","spades":[],"hearts":[],"clubs":[],"diamonds":[]}' > pages-site/data/regions/acasia.json
              REGION_MANIFEST='["acasia"]'
            fi
          fi
          
          echo "$REGION_MANIFEST" > pages-site/regions/manifest.json
          echo "$REGION_MANIFEST" > pages-site/data/regions/manifest.json
          echo "✅ Generated region manifest.json: $REGION_MANIFEST"
          
          # ============================================================
          # FACTION FILES — from data/factions/
          # ============================================================
          echo "🏛️ Processing faction files..."
          mkdir -p pages-site/factions
          mkdir -p pages-site/data/factions
          
          FACTION_COPIED=false
          
          # Primary source: data/factions/
          if [ -d "${PROJECT_ROOT}/data/factions" ]; then
            echo "📁 Copying from data/factions/ directory..."
            cp "${PROJECT_ROOT}/data/factions"/*.json pages-site/factions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/data/factions"/*.json pages-site/data/factions/ 2>/dev/null || true
            echo "✅ Copied data/factions/ → pages-site/factions/ and pages-site/data/factions/"
            FACTION_COPIED=true
          fi
          
          # Fallback: misc/factions/
          if [ "$FACTION_COPIED" = false ] && [ -d "${PROJECT_ROOT}/misc/factions" ]; then
            echo "📁 Copying from misc/factions/ directory..."
            cp "${PROJECT_ROOT}/misc/factions"/*.json pages-site/factions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/misc/factions"/*.json pages-site/data/factions/ 2>/dev/null || true
            echo "✅ Copied misc/factions/ → pages-site/factions/"
            FACTION_COPIED=true
          fi
          
          # Fallback: web-client/factions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/factions" ]; then
            echo "📁 Copying from web-client/factions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/factions"/*.json pages-site/factions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/factions"/*.json pages-site/data/factions/ 2>/dev/null || true
            echo "✅ Copied web-client/factions/ → pages-site/factions/"
            FACTION_COPIED=true
          fi
          
          # Fallback: web-client/data/factions/
          if [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/factions" ]; then
            echo "📁 Copying from web-client/data/factions/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/factions"/*.json pages-site/factions/ 2>/dev/null || true
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/factions"/*.json pages-site/data/factions/ 2>/dev/null || true
            echo "✅ Copied web-client/data/factions/ → pages-site/factions/"
            FACTION_COPIED=true
          fi
          
          # Rename factions-manifest.json to manifest.json if needed
          if [ -f pages-site/factions/factions-manifest.json ] && [ ! -f pages-site/factions/manifest.json ]; then
            mv pages-site/factions/factions-manifest.json pages-site/factions/manifest.json
            cp pages-site/factions/manifest.json pages-site/data/factions/manifest.json
            echo "✅ Renamed factions-manifest.json → manifest.json"
          fi
          
          # Generate manifest if needed
          echo "📝 Generating faction manifest.json..."
          FACTION_MANIFEST="["
          first=true
          for file in pages-site/factions/*.json; do
            if [ -f "$file" ] && [ "$(basename "$file")" != "manifest.json" ]; then
              name=$(basename "$file" .json)
              if [ "$first" = true ]; then
                FACTION_MANIFEST="${FACTION_MANIFEST}\"${name}\""
                first=false
              else
                FACTION_MANIFEST="${FACTION_MANIFEST}, \"${name}\""
              fi
            fi
          done
          FACTION_MANIFEST="${FACTION_MANIFEST}]"
          
          if [ "$FACTION_MANIFEST" = "[]" ]; then
            FACTION_MANIFEST='["bloody-fist", "ecktorian-censorate", "gray-ash", "house-contarini", "iron-league", "velvet-court"]'
          fi
          
          echo "$FACTION_MANIFEST" > pages-site/factions/manifest.json
          echo "$FACTION_MANIFEST" > pages-site/data/factions/manifest.json
          echo "✅ Generated faction manifest.json: $FACTION_MANIFEST"
          
          # ============================================================
          # PATRON FILES — from data/patrons/
          # ============================================================
          echo "👤 Processing patron files..."
          mkdir -p pages-site/data/patrons
          
          PATRON_COPIED=false
          
          # Primary source: data/patrons/
          if [ -d "${PROJECT_ROOT}/data/patrons" ]; then
            echo "📁 Copying from data/patrons/ directory..."
            cp "${PROJECT_ROOT}/data/patrons"/*.json pages-site/data/patrons/ 2>/dev/null || true
            echo "✅ Copied data/patrons/ → pages-site/data/patrons/"
            PATRON_COPIED=true
          fi
          
          # Fallback: socket-server/data/patrons/
          if [ "$PATRON_COPIED" = false ] && [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/patrons" ]; then
            echo "📁 Copying from socket-server/data/patrons/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-socket-server/data/patrons"/*.json pages-site/data/patrons/ 2>/dev/null || true
            echo "✅ Copied socket-server/data/patrons/ → pages-site/data/patrons/"
            PATRON_COPIED=true
          fi
          
          # Fallback: web-client/data/patrons/
          if [ "$PATRON_COPIED" = false ] && [ -d "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/patrons" ]; then
            echo "📁 Copying from web-client/data/patrons/ directory..."
            cp "${PROJECT_ROOT}/utilities/javascript/fates-edge-web-client/data/patrons"/*.json pages-site/data/patrons/ 2>/dev/null || true
            echo "✅ Copied web-client/data/patrons/ → pages-site/data/patrons/"
            PATRON_COPIED=true
          fi
          
          # Fallback: misc/patrons/
          if [ "$PATRON_COPIED" = false ] && [ -d "${PROJECT_ROOT}/misc/patrons" ]; then
            echo "📁 Copying from misc/patrons/ directory..."
            cp "${PROJECT_ROOT}/misc/patrons"/*.json pages-site/data/patrons/ 2>/dev/null || true
            echo "✅ Copied misc/patrons/ → pages-site/data/patrons/"
            PATRON_COPIED=true
          fi
          
          # Generate manifest if needed
          echo "📝 Generating patron manifest.json..."
          PATRON_MANIFEST="["
          first=true
          for file in pages-site/data/patrons/*.json; do
            if [ -f "$file" ] && [ "$(basename "$file")" != "manifest.json" ]; then
              name=$(basename "$file" .json)
              if [ "$first" = true ]; then
                PATRON_MANIFEST="${PATRON_MANIFEST}\"${name}\""
                first=false
              else
                PATRON_MANIFEST="${PATRON_MANIFEST}, \"${name}\""
              fi
            fi
          done
          PATRON_MANIFEST="${PATRON_MANIFEST}]"
          
          if [ "$PATRON_MANIFEST" = "[]" ]; then
            if [ -f pages-site/data/patrons/the_traveler.json ]; then
              PATRON_MANIFEST='["the_traveler"]'
            else
              echo '{"id":"the_traveler","name":"The Traveler","description":"A mysterious wanderer","domain":"Ways & Journeys","rites":[]}' > pages-site/data/patrons/the_traveler.json
              PATRON_MANIFEST='["the_traveler"]'
            fi
          fi
          
          echo "$PATRON_MANIFEST" > pages-site/data/patrons/manifest.json
          echo "✅ Generated patron manifest.json: $PATRON_MANIFEST"
          
          # ============================================================
          # SEED.JS — from data/
          # ============================================================
          echo "🌱 Processing seed files..."
          
          if [ -f "${PROJECT_ROOT}/data/seed.js" ]; then
            cp "${PROJECT_ROOT}/data/seed.js" pages-site/seed.js
            cp "${PROJECT_ROOT}/data/seed.js" pages-site/data/seed.js
            echo "✅ Copied data/seed.js → pages-site/seed.js"
          fi
          
          if [ -f "${PROJECT_ROOT}/data/seed.json" ]; then
            cp "${PROJECT_ROOT}/data/seed.json" pages-site/seed.json
            cp "${PROJECT_ROOT}/data/seed.json" pages-site/data/seed.json
            echo "✅ Copied data/seed.json → pages-site/seed.json"
          fi
          
          # ============================================================
          # MANIFEST-CORE.JSON — from data/
          # ============================================================
          echo "📋 Processing manifest-core.json..."
          
          if [ -f "${PROJECT_ROOT}/data/manifest-core.json" ]; then
            cp "${PROJECT_ROOT}/data/manifest-core.json" pages-site/manifest-core.json
            cp "${PROJECT_ROOT}/data/manifest-core.json" pages-site/data/manifest-core.json
            echo "✅ Copied data/manifest-core.json → pages-site/manifest-core.json"
          elif [ -f "${PROJECT_ROOT}/misc/manifest-core.json" ]; then
            cp "${PROJECT_ROOT}/misc/manifest-core.json" pages-site/manifest-core.json
            cp "${PROJECT_ROOT}/misc/manifest-core.json" pages-site/data/manifest-core.json
            echo "✅ Copied misc/manifest-core.json → pages-site/manifest-core.json"
          else
            echo '{"version":"3.0","modules":["regions","factions","patrons"]}' > pages-site/manifest-core.json
            echo '{"version":"3.0","modules":["regions","factions","patrons"]}' > pages-site/data/manifest-core.json
            echo "⚠️ No manifest-core.json found, created minimal version"
          fi
          
          # ============================================================
          # PACK.JSON — for pack management
          # ============================================================
          echo "📦 Processing pack.json..."
          
          if [ -f "${PROJECT_ROOT}/data/pack.json" ]; then
            mkdir -p pages-site/misc
            cp "${PROJECT_ROOT}/data/pack.json" pages-site/misc/pack.json
            echo "✅ Copied data/pack.json → pages-site/misc/pack.json"
          elif [ -f "${PROJECT_ROOT}/misc/pack.json" ]; then
            mkdir -p pages-site/misc
            cp "${PROJECT_ROOT}/misc/pack.json" pages-site/misc/pack.json
            echo "✅ Copied misc/pack.json → pages-site/misc/pack.json"
          fi
          
          # ============================================================
          # BACKUP COPIES TO DATA/
          # ============================================================
          echo "💾 Creating backup copies..."
          
          # Ensure all data is in the data/ directory structure
          mkdir -p pages-site/data/regions
          mkdir -p pages-site/data/factions
          mkdir -p pages-site/data/patrons
          
          # Copy region files to data/regions as backup
          if [ -d pages-site/regions ]; then
            cp pages-site/regions/*.json pages-site/data/regions/ 2>/dev/null || true
            echo "✅ Copied regions to data/regions/ as backup"
          fi
          
          # Copy faction files to data/factions as backup
          if [ -d pages-site/factions ]; then
            cp pages-site/factions/*.json pages-site/data/factions/ 2>/dev/null || true
            echo "✅ Copied factions to data/factions/ as backup"
          fi
          
          # ============================================================
          # DEBUG OUTPUT
          # ============================================================
          echo ""
          echo "📂 Site root contents:"
          ls -la pages-site/ | head -20
          echo ""
          echo "📂 .seed directory contents:"
          ls -la pages-site/.seed/ || echo "  (empty)"
          echo ""
          echo "📂 Regions directory contents:"
          ls -la pages-site/regions/ || echo "  (empty)"
          echo ""
          echo "📂 Factions directory contents:"
          ls -la pages-site/factions/ || echo "  (empty)"
          echo ""
          echo "📂 Data directory contents:"
          ls -la pages-site/data/ || echo "  (empty)"
          echo ""
          echo "📂 Data/regions directory contents:"
          ls -la pages-site/data/regions/ || echo "  (empty)"
          echo ""
          echo "📂 Data/patrons directory contents:"
          ls -la pages-site/data/patrons/ || echo "  (empty)"
          echo ""
          echo "📂 Data/factions directory contents:"
          ls -la pages-site/data/factions/ || echo "  (empty)"
          echo ""
          echo "📂 Misc directory contents:"
          ls -la pages-site/misc/ || echo "  (empty)"
          echo ""
          echo "✅ All data copied successfully!"

      - name: Upload Pages artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  # ============================================================
  # DEPLOY TO GITHUB PAGES
  # ============================================================
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: >
      !(github.event_name == 'workflow_dispatch' &&
        github.event.inputs.skip_web_deploy == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # DEPLOY SOCKET SERVER TO RENDER
  # ============================================================
  deploy-render:
    name: Deploy Socket Server to Render
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: always() && !cancelled()
    
    permissions:
      contents: read
      actions: read
    
    steps:
      - name: Check if socket server was built
        id: check-build
        run: |
          # Check if the socket-server build artifact exists
          if [ -f "artifacts/socket-server-package/socket-server-package" ]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
            echo "✅ Socket server package found"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Socket server package not found, skipping deployment"
          fi
      
      - name: Download socket server artifact
        if: steps.check-build.outputs.built == 'true'
        uses: actions/download-artifact@v6
        with:
          name: socket-server-package
          path: socket-server-deploy
      
      - name: Deploy to Render
        if: steps.check-build.outputs.built == 'true'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SOCKET_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️ Render secrets not configured. Skipping deployment."
            echo "To enable, add RENDER_API_KEY and RENDER_SOCKET_SERVICE_ID to GitHub secrets."
            exit 0
          fi
          
          echo "🚀 Deploying socket server to Render..."
          echo "Service ID: $RENDER_SERVICE_ID"
          
          # Trigger deployment via Render API
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceId": "'"$RENDER_SERVICE_ID"'",
              "clearCache": "true"
            }' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys)
          
          echo "📡 Response: $RESPONSE"
          
          # Check if deployment was triggered
          if echo "$RESPONSE" | grep -q '"id"'; then
            DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "✅ Deployment triggered successfully!"
            echo "Deploy ID: $DEPLOY_ID"
            echo "Deploy URL: https://dashboard.render.com/web/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID"
          else
            ERROR_MSG=$(echo "$RESPONSE" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ -n "$ERROR_MSG" ]; then
              echo "❌ Deployment failed: $ERROR_MSG"
            else
              echo "❌ Deployment failed. Response: $RESPONSE"
            fi
            exit 1
          fi
      
      - name: Wait for deployment (optional)
        if: steps.check-build.outputs.built == 'true'
        run: |
          echo "⏳ Deployment in progress..."
          echo "Check status at: https://dashboard.render.com/web/${{ secrets.RENDER_SOCKET_SERVICE_ID }}"
          echo "Check live at: https://fates-edge-socket-server.onrender.com"

  # ============================================================
  # RELEASE CREATION
  # ============================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, deploy-pages, deploy-render]

    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true' &&
      github.event.inputs.release_version != ''

    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: '*-package'
          path: artifacts/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.tar.gz release-assets/
          
          # Copy LICENSE.md to release assets
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md release-assets/LICENSE.md
            echo "✅ Copied LICENSE.md to release assets"
          fi

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Release ${{ github.event.inputs.release_version }}
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
            release-assets/LICENSE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}