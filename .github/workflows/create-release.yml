name: Create Release

on:
  workflow_run:
    workflows: ["Build Apps and Packages"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow to fetch artifacts from'
        type: number
        required: true
      release_version:
        description: 'Version tag for release (e.g., v1.2.0)'
        type: string
        required: true

permissions:
  contents: write
  actions: read

# Prevent multiple release jobs from running concurrently
# If a new release is triggered while one is in progress, cancel the old one
concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    # For workflow_run, only proceed if the build succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Determine run ID
        id: get-run-id
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Ensure release-assets exists
        run: mkdir -p release-assets

      - name: Download packaged artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.get-run-id.outputs.run-id }}
          pattern: '*-package'
          path: release-assets
          # Use GitHub token to authenticate – required for downloading from different workflow runs
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: List downloaded files and build file list
        id: files
        run: |
          # Find all .tar.gz files, store the list
          FILES=$(find release-assets -type f -name "*.tar.gz" | sort)
          if [ -n "$FILES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            # Build a bullet list of file names for the release body
            FILE_LIST=""
            for f in $FILES; do
              # Extract the package name from the path: e.g., release-assets/web-client-package/web-client.tar.gz
              PKG_NAME=$(basename "$(dirname "$f")")
              FILE_LIST="$FILE_LIST\n- $PKG_NAME"
            done
            echo "file_list=$FILE_LIST" >> $GITHUB_OUTPUT
            echo "file_count=$(echo "$FILES" | wc -l)" >> $GITHUB_OUTPUT
            echo "Found $(echo "$FILES" | wc -l) artifacts"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No artifacts found"
          fi

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_version }}"
          else
            BUILD_RUN_NUMBER="${{ github.event.workflow_run.run_number }}"
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            TAG="v$(date +'%Y.%m.%d')-build$BUILD_RUN_NUMBER-$SHORT_SHA"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release body
        id: body
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TRIGGER="Manual trigger"
          else
            TRIGGER="Automated from build run #${{ github.event.workflow_run.run_number }}"
          fi
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          BODY="**$TRIGGER**\n"
          BODY="$BODY- Commit: \`$SHORT_SHA\`\n"
          BODY="$BODY- Run ID: ${{ steps.get-run-id.outputs.run-id }}\n\n"

          if [ "${{ steps.files.outputs.found }}" == "true" ]; then
            BODY="$BODY### 📦 Included Packages\n${{ steps.files.outputs.file_list }}\n"
          else
            BODY="$BODY⚠️ **No packaged artifacts were found in the build run.**\n"
          fi

          # Save body to output (multi-line)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        # Only run if at least one artifact was found
        if: steps.files.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          files: |
            release-assets/*/*.tar.gz
          draft: false
          prerelease: false

      - name: Skip release (no artifacts)
        if: steps.files.outputs.found != 'true'
        run: |
          echo "No artifacts found. Skipping release creation."
          exit 0