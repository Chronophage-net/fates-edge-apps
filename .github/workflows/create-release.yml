name: Create Release

on:
  workflow_run:
    workflows: ["Build Apps and Packages"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow to fetch artifacts from'
        type: number
        required: true
      release_version:
        description: 'Version tag for release (e.g., v1.2.0)'
        type: string
        required: true

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Determine run ID
        id: get-run-id
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Using run ID: $RUN_ID"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.get-run-id.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: '*-package'
          path: release-assets
        continue-on-error: true

      - name: Create release-assets directory if it doesn't exist
        run: mkdir -p release-assets

      - name: List downloaded files
        run: |
          echo "Files downloaded:"
          find release-assets -type f -name "*.tar.gz" -ls || echo "No .tar.gz files found"

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_version }}"
          else
            BUILD_RUN_NUMBER="${{ github.event.workflow_run.run_number }}"
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            TAG="v$(date +'%Y.%m.%d')-build$BUILD_RUN_NUMBER-$SHORT_SHA"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if any artifacts exist
        id: check-artifacts
        run: |
          if [ -d "release-assets" ] && [ -n "$(find release-assets -type f -name '*.tar.gz' | head -1)" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release from build run #${{ steps.get-run-id.outputs.run-id }}
            Commit: ${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ steps.check-artifacts.outputs.found == 'false' && '⚠️ **No packaged artifacts were found in the build run.**' || '' }}
          files: |
            release-assets/*/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}