name: Build Apps and Packages

on:
  push:
    branches: [main]
    paths:
      - 'utilities/javascript/fates-edge-web-client/**'
      - 'utilities/javascript/fates-edge-socket-server/**'
      - 'utilities/javascript/fates-edge-desktop-client/**'
      - 'utilities/vtt_mods_bots/**'
      - 'misc/**'
      - 'data/**'
      - '.github/workflows/build-apps-and-packages.yml'
  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
        description: 'Skip web client deployment to Pages'
      skip_socket_deploy:
        type: boolean
        default: false
        description: 'Skip socket server deployment to Render'
      create_release:
        type: boolean
        default: true
        description: 'Create a GitHub Release (triggers the release workflow)'
      release_version:
        type: string
        required: true
        description: 'Version tag for release (e.g., v1.2.0)'

env:
  NODE_VERSION: 22

permissions:
  contents: read

concurrency:
  group: "build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            needs_node: true
            build: true
            package: true
          - name: socket-server
            path: utilities/javascript/fates-edge-socket-server
            needs_node: true
            build: false
            package: true
          - name: desktop-client
            path: utilities/javascript/fates-edge-desktop-client
            needs_node: true
            build: true
            package: true
          - name: discord-bot
            path: utilities/vtt_mods_bots/fates-edge-discord-bot
            needs_node: true
            build: false
            package: true
          - name: roll20
            path: utilities/vtt_mods_bots/fates-edge-roll20
            needs_node: true
            build: false
            package: true
          - name: foundry-bridge
            path: utilities/vtt_mods_bots/foundry_fates-edge-bridge
            needs_node: true
            build: false
            package: true

    env:
      SKIP_JOB: >
        ${{
          (matrix.name == 'web-client' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true') ||
          (matrix.name == 'socket-server' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_socket_deploy == 'true')
        }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        if: ${{ env.SKIP_JOB != 'true' }}

      - name: Setup Node.js
        if: ${{ env.SKIP_JOB != 'true' && matrix.needs_node == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        if: ${{ env.SKIP_JOB != 'true' && matrix.needs_node == 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies (including dev)
        if: ${{ env.SKIP_JOB != 'true' && matrix.needs_node == 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      # ---- Special seed generation for web-client ----
      - name: Generate deterministic seed (web-client only)
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        working-directory: ${{ matrix.path }}
        run: |
          echo "🎲 Generating deterministic seed for static site..."
          if [ -f js/tools/generate-seed.js ]; then
            node js/tools/generate-seed.js --force --output=.seed/random-seed.json
            echo "✅ Seed generated"
            mkdir -p data
            cp .seed/random-seed.json data/seed.json 2>/dev/null || true
            cp .seed/seed.js js/seed.js 2>/dev/null || true
          else
            echo "⚠️ generate-seed.js not found, skipping seed generation"
          fi

      # ---- Build step ----
      - name: Build project
        if: ${{ env.SKIP_JOB != 'true' && matrix.build == 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      # ---- Prune dev dependencies for non‑built services ----
      - name: Install production dependencies only (for services without build)
        if: ${{ env.SKIP_JOB != 'true' && matrix.package == 'true' && matrix.build == 'false' }}
        working-directory: ${{ matrix.path }}
        run: npm prune --production

      # ---- Package step ----
      - name: Package project
        if: ${{ env.SKIP_JOB != 'true' && matrix.package == 'true' }}
        run: |
          mkdir -p artifacts
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md ${{ matrix.path }}/LICENSE.md
            echo "✅ Copied LICENSE.md to ${{ matrix.path }}/"
          fi

          if [ "${{ matrix.build }}" == "true" ]; then
            if [ -d "${{ matrix.path }}/dist" ]; then
              tar -czf artifacts/${{ matrix.name }}.tar.gz -C ${{ matrix.path }}/dist .
              echo "✅ Packaged build output (dist/) for ${{ matrix.name }}"
            else
              echo "⚠️ No dist/ folder found for ${{ matrix.name }}, packaging source instead"
              tar -czf artifacts/${{ matrix.name }}.tar.gz \
                -C ${{ matrix.path }} \
                --exclude=node_modules \
                --exclude=.git \
                .
            fi
          else
            tar -czf artifacts/${{ matrix.name }}.tar.gz \
              -C ${{ matrix.path }} \
              --exclude=.git \
              .
            echo "✅ Packaged source with production node_modules for ${{ matrix.name }}"
          fi

      - name: Upload packaged artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.package == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: error

      # ---- Upload web-client dist separately for Pages ----
      - name: Upload web-client dist for Pages
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' && matrix.build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: web-client-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error

      # ---- Prepare static site for Pages ----
      - name: Prepare static site for Pages (web-client only)
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📦 Preparing static site for GitHub Pages..."
          mkdir -p pages-site
          
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/
          
          echo "🌱 Including seed files..."
          mkdir -p pages-site/.seed pages-site/data
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/.seed/
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/data/seed.json
            echo "✅ Seed files copied"
          fi
          if [ -f "${{ matrix.path }}/.seed/seed.js" ]; then
            cp "${{ matrix.path }}/.seed/seed.js" pages-site/.seed/
            echo "✅ seed.js copied"
          fi

      - name: Copy data files to Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Copying data files to Pages site..."
          
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md pages-site/
            echo "✅ LICENSE.md copied"
          fi
          
          echo "📄 Processing wiki.json..."
          WIKI_COPIED=false
          for src in "data/wiki.json" "misc/wiki.json" "${{ matrix.path }}/data/wiki.json"; do
            if [ -f "$src" ]; then
              cp "$src" pages-site/wiki.json
              cp "$src" pages-site/data/wiki.json 2>/dev/null || true
              echo "✅ wiki.json copied from $src"
              WIKI_COPIED=true
              break
            fi
          done
          if [ "$WIKI_COPIED" = false ]; then
            echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/wiki.json
            echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/data/wiki.json
            echo "⚠️ No wiki.json found, created minimal version"
          fi
          
          echo "🗺️ Processing region files..."
          mkdir -p pages-site/data/regions
          for src_dir in "data/data/regions" "misc/data/regions" "${{ matrix.path }}/data/regions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir"/* pages-site/data/regions/ 2>/dev/null || true
              echo "✅ Regions copied from $src_dir"
              break
            fi
          done
          
          echo "🏛️ Processing faction files..."
          mkdir -p pages-site/factions pages-site/data/factions
          for src_dir in "data/factions" "misc/factions" "${{ matrix.path }}/data/factions" "${{ matrix.path }}/factions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir"/* pages-site/factions/ 2>/dev/null || true
              cp -r "$src_dir"/* pages-site/data/factions/ 2>/dev/null || true
              echo "✅ Factions copied from $src_dir"
              break
            fi
          done
          
          echo "👤 Processing patron files..."
          mkdir -p pages-site/data/regions
          for src_dir in "data/data/regions" "misc/data/regions" "${{ matrix.path }}/data/regions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir"/* pages-site/data/regions/ 2>/dev/null || true
              echo "✅ Patrons copied from $src_dir"
              break
            fi
          done
          
          if [ -d "data" ]; then
            for file in data/*.json data/*.js; do
              if [ -f "$file" ] && [ "$(basename "$file")" != "wiki.json" ] && [ "$(basename "$file")" != "seed.json" ]; then
                cp "$file" pages-site/data/ 2>/dev/null || true
              fi
            done
            echo "✅ Additional data files copied"
          fi
          
          echo "✅ All data files copied successfully!"

      - name: Verify pages-site structure
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Pages site structure:"
          echo ""
          echo "Root contents:"
          ls -la pages-site/ | head -15
          echo ""
          echo "Data directory:"
          ls -la pages-site/data/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          echo "Regions directory:"
          ls -la pages-site/data/regions/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          echo "Factions directory:"
          ls -la pages-site/factions/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          echo "Patrons directory:"
          ls -la pages-site/data/regions/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          
          if [ -f "pages-site/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "⚠️ WARNING: index.html not found - site may not render correctly"
          fi

      - name: Upload Pages artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      # ---- Save build metadata ----
      - name: Save build metadata (socket-server only)
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'socket-server' }}
        run: |
          mkdir -p build-metadata
          echo "${{ github.sha }}" > build-metadata/commit-sha.txt
          echo "${{ github.run_id }}" > build-metadata/run-id.txt
          echo "${{ github.run_number }}" > build-metadata/run-number.txt
          echo "Build timestamp: $(date -u)" > build-metadata/build-time.txt

      - name: Upload build metadata
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'socket-server' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-socket-server
          path: build-metadata/
          retention-days: 1

  # ============================================================
  # DEPLOY WEB CLIENT (Pages)
  # ============================================================
  deploy-pages:
    name: Deploy Web Client to Pages
    needs: build
    if: >
      success() && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy != 'true')
      )
    uses: ./.github/workflows/deploy-web-client.yml
    secrets: inherit
    permissions:
      contents: read
      pages: write
      id-token: write

  # ============================================================
  # DEPLOY SOCKET SERVER (Render)
  # ============================================================
  deploy-render:
    name: Deploy Socket Server to Render
    needs: build
    # ---- ADDED DEBUG OUTPUT BEFORE THE CONDITION ----
    # This will print the values that determine whether the job runs.
    # The job will always run this debug step, then the actual deployment
    # will happen only if the condition is true.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()  # This ensures the debug step always runs, even if build failed
    steps:
      - name: Debug deployment condition
        run: |
          echo "=== DEPLOY-RENDER CONDITION DEBUG ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Build success: ${{ needs.build.result == 'success' }}"
          echo "Skip socket deploy input: ${{ github.event.inputs.skip_socket_deploy }}"
          echo "Should run? ${{ needs.build.result == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_socket_deploy != 'true')) }}"

    # The actual deployment job – this will be skipped if the condition is false
    # We'll use a separate job to avoid the 'always()' interfering.
    # Instead, we'll put the deployment in a separate job that runs only if the condition is met.
    # But to keep it simple, we'll move the debug to a step within the job, but we need the job to run only when condition is true.
    # I'll restructure: we have a single job with the condition, and inside we add a debug step.
    # But the condition is evaluated at job level; if it's false, the job is skipped and we don't see debug.
    # So we need to use a separate job with always() to debug, or we can use a step that runs regardless? Not possible if job is skipped.
    # Better: we'll keep the condition as is, and we'll add a preliminary job that always runs and prints the condition values, then we use the actual job with the condition.
    # That would duplicate logic. Simpler: we'll add a "pre-check" job that runs always, but that's overkill.
    # Since the user wants to know why it's skipped, we can rely on the GitHub UI – it shows the condition evaluation.
    # I'll leave the condition as is and explain that they can see the evaluation in the UI.

  # Actually, let's keep the existing job structure but add the debug in the job itself, but the job won't run if condition false.
  # The user can see the condition evaluation in the UI anyway.
  # So I'll keep the original job but add a debug step inside it (if it runs). For skipped jobs, they can see the skip reason.
  # I'll provide the revised file with the original condition and a note about checking the UI.

  # However, to make the condition clearer, I'll rewrite it with an explicit check:

  deploy-render-final:
    name: Deploy Socket Server to Render
    needs: build
    if: >
      needs.build.result == 'success' && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_socket_deploy != 'true')
      )
    uses: ./.github/workflows/deploy-socket-server-to-render.yml
    with:
      environment: production
    secrets: inherit
    permissions:
      contents: read
      actions: read

  # ============================================================
  # TRIGGER RELEASE WORKFLOW (if requested)
  # ============================================================
  trigger-release:
    name: Create Release (manual only)
    needs: build
    if: >
      needs.build.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Dispatch release workflow
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const version = '${{ github.event.inputs.release_version }}' || `v${new Date().toISOString().slice(0,10)}-build${context.runNumber}`;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'create-release.yml',
              ref: 'main',
              inputs: {
                run_id: runId.toString(),
                release_version: version
              }
            });