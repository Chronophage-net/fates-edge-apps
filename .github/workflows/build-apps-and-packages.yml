name: Build Apps and Packages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      skip_socket_deploy:
        type: boolean
        default: false

env:
  NODE_VERSION: 22

permissions:
  contents: read

concurrency:
  group: "build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            needs_node: true
            build: true
            package: true
          - name: socket-server
            path: utilities/javascript/fates-edge-socket-server
            needs_node: true
            build: false
            package: true
          - name: desktop-client
            path: utilities/javascript/fates-edge-desktop-client
            needs_node: true
            build: true
            package: true
          - name: discord-bot
            path: utilities/vtt_mods_bots/fates-edge-discord-bot
            needs_node: true
            build: false
            package: true
          - name: roll20
            path: utilities/vtt_mods_bots/fates-edge-roll20
            needs_node: true
            build: false
            package: true
          - name: foundry-bridge
            path: utilities/vtt_mods_bots/foundry_fates-edge-bridge
            needs_node: true
            build: false
            package: true

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.needs_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        if: matrix.needs_node == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies
        if: matrix.needs_node == 'true'
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Generate deterministic seed (web-client only)
        if: matrix.name == 'web-client'
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f js/tools/generate-seed.js ]; then
            node js/tools/generate-seed.js --force --output=.seed/random-seed.json
            mkdir -p data
            cp .seed/random-seed.json data/seed.json || true
            cp .seed/seed.js js/seed.js || true
          fi

      - name: Build project
        if: matrix.build == 'true'
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Install production dependencies (no-build packages)
        if: matrix.package == 'true' && matrix.build == 'false'
        working-directory: ${{ matrix.path }}
        run: npm prune --production

      - name: Package project
        if: matrix.package == 'true'
        run: |
          mkdir -p artifacts
          if [ -f LICENSE.md ]; then
            cp LICENSE.md ${{ matrix.path }}/LICENSE.md || true
          fi

          if [ "${{ matrix.build }}" == "true" ] && [ -d "${{ matrix.path }}/dist" ]; then
            tar -czf artifacts/${{ matrix.name }}.tar.gz -C ${{ matrix.path }}/dist .
          else
            tar -czf artifacts/${{ matrix.name }}.tar.gz \
              -C ${{ matrix.path }} \
              --exclude=node_modules \
              --exclude=.git \
              .
          fi

      - name: Upload packaged artifact
        if: matrix.package == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz

      # -----------------------------
      # Prepare Pages site (web-client)
      # -----------------------------
      - name: Prepare static site for Pages
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        run: |
          mkdir -p pages-site
          rsync -a \
            --exclude node_modules \
            --exclude Dockerfile* \
            --exclude docker-compose.yml \
            --exclude Makefile \
            --exclude package.json \
            --exclude package-lock.json \
            --exclude DESIGN.md \
            --exclude build.sh \
            --exclude vite.config.js \
            --exclude .gitignore \
            --exclude .DS_Store \
            --exclude js/tests \
            "${{ matrix.path }}/" pages-site/

          mkdir -p pages-site/.seed pages-site/data
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/.seed/
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/data/seed.json
          fi
          if [ -f "${{ matrix.path }}/.seed/seed.js" ]; then
            cp "${{ matrix.path }}/.seed/seed.js" pages-site/.seed/
          fi

      - name: Copy data files
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        run: |
          mkdir -p pages-site/data pages-site/data/regions pages-site/data/factions pages-site/data/patrons

          # wiki.json
          for src in "data/wiki.json" "misc/wiki.json" "${{ matrix.path }}/data/wiki.json"; do
            if [ -f "$src" ]; then
              cp "$src" pages-site/wiki.json
              cp "$src" pages-site/data/wiki.json || true
              break
            fi
          done

          # regions
          for src in "data/data/regions" "misc/data/regions" "${{ matrix.path }}/data/regions"; do
            if [ -d "$src" ]; then
              cp -r "$src"/* pages-site/data/regions/
              break
            fi
          done

          # factions
          for src in "data/factions" "misc/factions" "${{ matrix.path }}/data/factions" "${{ matrix.path }}/factions"; do
            if [ -d "$src" ]; then
              cp -r "$src"/* pages-site/data/factions/
              break
            fi
          done

          # patrons
          for src in "data/patrons" "misc/patrons" "${{ matrix.path }}/data/patrons"; do
            if [ -d "$src" ]; then
              cp -r "$src"/* pages-site/data/patrons/
              break
            fi
          done

      # 👇 Only upload when the preparation actually ran
      - name: Upload pages-site artifact
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: pages-site
          path: pages-site

  deploy-pages:
    name: Deploy Web Client to Pages
    needs: build
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy != 'true'))
    uses: ./.github/workflows/deploy-web-client.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit

  deploy-render:
    name: Deploy Socket Server to Render
    needs: build
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_socket_deploy != 'true'))
    uses: ./.github/workflows/deploy-socket-server-to-render.yml
    permissions:
      contents: read
      actions: read
    with:
      environment: production
    secrets: inherit