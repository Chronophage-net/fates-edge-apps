name: Build Apps and Packages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      skip_socket_deploy:
        type: boolean
        default: false

env:
  NODE_VERSION: 22

permissions:
  contents: read

concurrency:
  group: "build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            needs_node: true
            build: true
            package: true
          # ... (other packages remain the same)

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      # ... (Node setup, cache, install, build, package steps are unchanged)

     # ============================================================
      # PREPARE STATIC SITE FOR PAGES (web-client only)
      # ============================================================
      - name: Prepare static site for Pages
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📦 Preparing static site for GitHub Pages..."
          mkdir -p pages-site

          rsync -aL \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/

          echo "🌱 Including seed files..."
          mkdir -p pages-site/.seed pages-site/data
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp -aL "${{ matrix.path }}/.seed/random-seed.json" pages-site/.seed/
            cp -aL "${{ matrix.path }}/.seed/random-seed.json" pages-site/data/seed.json
            echo "✅ Seed files copied"
          fi
          if [ -f "${{ matrix.path }}/.seed/seed.js" ]; then
            cp -aL "${{ matrix.path }}/.seed/seed.js" pages-site/.seed/
            echo "✅ seed.js copied"
          fi

        - name: Copy data files to Pages site
          if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
          run: |
            echo "📂 Copying data files to Pages site..."

            if [ -f "LICENSE.md" ]; then
              cp -aL LICENSE.md pages-site/
              echo "✅ LICENSE.md copied"
            fi

            echo "📄 Processing wiki.json..."
            WIKI_COPIED=false
            for src in "data/wiki.json" "misc/wiki.json" "${{ matrix.path }}/data/wiki.json"; do
              if [ -f "$src" ]; then
                cp -aL "$src" pages-site/wiki.json
                cp -aL "$src" pages-site/data/wiki.json 2>/dev/null || true
                echo "✅ wiki.json copied from $src"
                WIKI_COPIED=true
                break
              fi
            done
            if [ "$WIKI_COPIED" = false ]; then
              echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/wiki.json
              echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/data/wiki.json
              echo "⚠️ No wiki.json found, created minimal version"
            fi

            echo "🗺️ Processing region files..."
            mkdir -p pages-site/regions pages-site/data/regions
            for src_dir in "data/regions" "misc/regions" "${{ matrix.path }}/data/regions" "${{ matrix.path }}/regions"; do
              if [ -d "$src_dir" ]; then
                cp -aL "$src_dir"/* pages-site/regions/ 2>/dev/null || true
                cp -aL "$src_dir"/* pages-site/data/regions/ 2>/dev/null || true
                echo "✅ Regions copied from $src_dir"
                break
              fi
            done

            echo "🏛️ Processing faction files..."
            mkdir -p pages-site/factions pages-site/data/factions
            for src_dir in "data/factions" "misc/factions" "${{ matrix.path }}/data/factions" "${{ matrix.path }}/factions"; do
              if [ -d "$src_dir" ]; then
                cp -aL "$src_dir"/* pages-site/factions/ 2>/dev/null || true
                cp -aL "$src_dir"/* pages-site/data/factions/ 2>/dev/null || true
                echo "✅ Factions copied from $src_dir"
                break
              fi
            done

            echo "👤 Processing patron files..."
            mkdir -p pages-site/data/patrons
            for src_dir in "data/patrons" "misc/patrons" "${{ matrix.path }}/data/patrons"; do
              if [ -d "$src_dir" ]; then
                cp -aL "$src_dir"/* pages-site/data/patrons/ 2>/dev/null || true
                echo "✅ Patrons copied from $src_dir"
                break
              fi
            done

            if [ -d "data" ]; then
              for file in data/*.json data/*.js; do
                if [ -f "$file" ] && [ "$(basename "$file")" != "wiki.json" ] && [ "$(basename "$file")" != "seed.json" ]; then
                  cp -aL "$file" pages-site/data/ 2>/dev/null || true
                fi
              done
              echo "✅ Additional data files copied"
            fi

            echo "✅ All data files copied successfully!"

        - name: Verify no symlinks in pages-site
          if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
          run: |
            if find pages-site -type l | grep -q .; then
              echo "❌ Symlinks found:"
              find pages-site -type l
              exit 1
            fi
            echo "✅ No symlinks"

      - name: Verify and debug pages-site
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        run: |
          echo "=== Directory tree (first 100 files) ==="
          find pages-site -type f | head -100

          echo "=== File sizes ==="
          du -sh pages-site

          echo "=== Checking for symlinks ==="
          find pages-site -type l && { echo "❌ Symlinks found"; exit 1; } || echo "✅ No symlinks"

          echo "=== Checking for hard links ==="
          find pages-site -type f -links +1 && { echo "❌ Hard links found"; exit 1; } || echo "✅ No hard links"

          echo "=== File types ==="
          find pages-site -type f -exec file --brief {} \; | sort | uniq -c

      - name: Upload Pages artifact
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: pages-site

  deploy-pages:
    name: Deploy Web Client to Pages
    needs: build
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy != 'true'))
    uses: ./.github/workflows/deploy-web-client.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit

  deploy-render:
    name: Deploy Socket Server to Render
    needs: build
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_socket_deploy != 'true'))
    uses: ./.github/workflows/deploy-socket-server-to-render.yml
    permissions:
      contents: read
      actions: read
    with:
      environment: production
    secrets: inherit