name: Build Apps and Packages

on:
  push:
    branches: [main]
    paths:
      - 'utilities/javascript/fates-edge-web-client/**'
      - 'utilities/javascript/fates-edge-socket-server/**'
      - 'utilities/javascript/fates-edge-desktop-client/**'
      - 'utilities/vtt_mods_bots/**'
      - 'misc/**'
      - 'data/**'
      - '.github/workflows/build-apps-and-packages.yml'
  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
        description: 'Skip web client deployment to Pages'
      create_release:
        type: boolean
        default: false
        description: 'Create a GitHub Release'
      release_version:
        type: string
        required: false
        description: 'Version tag for release (e.g., v1.2.0)'

env:
  NODE_VERSION: 22

permissions:
  contents: read

concurrency:
  group: "build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            needs_node: true
            build: false
            package: false
          - name: socket-server
            path: utilities/javascript/fates-edge-socket-server
            needs_node: true
            build: false
            package: true
          - name: desktop-client
            path: utilities/javascript/fates-edge-desktop-client
            needs_node: true
            build: false
            package: true
          - name: discord-bot
            path: utilities/vtt_mods_bots/fates-edge-discord-bot
            needs_node: true
            build: false
            package: true
          - name: roll20
            path: utilities/vtt_mods_bots/fates-edge-roll20
            needs_node: true
            build: false
            package: true
          - name: foundry-bridge
            path: utilities/vtt_mods_bots/foundry_fates-edge-bridge
            needs_node: true
            build: false
            package: true

    env:
      SKIP_JOB: ${{ matrix.name == 'web-client' && github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy == 'true' }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        if: ${{ env.SKIP_JOB != 'true' }}

      - name: Setup Node.js
        if: ${{ env.SKIP_JOB != 'true' && matrix.needs_node == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node modules
        if: ${{ env.SKIP_JOB != 'true' && matrix.needs_node == 'true' }}
        uses: actions/cache@v5
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ matrix.name }}-${{ hashFiles(format('{0}/package-lock.json', matrix.path)) }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.name }}-

      - name: Install dependencies
        if: ${{ env.SKIP_JOB != 'true' && matrix.needs_node == 'true' }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Generate deterministic seed
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        working-directory: ${{ matrix.path }}
        run: |
          echo "🎲 Generating deterministic seed for static site..."
          if [ -f js/tools/generate-seed.js ]; then
            node js/tools/generate-seed.js --force --output=.seed/random-seed.json
            echo "✅ Seed generated"
            mkdir -p data
            cp .seed/random-seed.json data/seed.json 2>/dev/null || true
            cp .seed/seed.js js/seed.js 2>/dev/null || true
          else
            echo "⚠️ generate-seed.js not found, skipping seed generation"
          fi

      - name: Build project
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package project
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        run: |
          mkdir -p artifacts
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md ${{ matrix.path }}/LICENSE.md
            echo "✅ Copied LICENSE.md to ${{ matrix.path }}/"
          fi
          tar -czf artifacts/${{ matrix.name }}.tar.gz \
            -C ${{ matrix.path }} \
            --exclude=node_modules \
            --exclude=.git \
            .

      - name: Upload build artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.build }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-dist
          path: ${{ matrix.path }}/dist
          if-no-files-found: error

      - name: Upload packaged artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.package }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}-package
          path: artifacts/${{ matrix.name }}.tar.gz
          if-no-files-found: error

      - name: Save build metadata
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'socket-server' }}
        run: |
          mkdir -p build-metadata
          echo "${{ github.sha }}" > build-metadata/commit-sha.txt
          echo "${{ github.run_id }}" > build-metadata/run-id.txt
          echo "${{ github.run_number }}" > build-metadata/run-number.txt
          echo "Build timestamp: $(date -u)" > build-metadata/build-time.txt

      - name: Upload build metadata
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'socket-server' }}
        uses: actions/upload-artifact@v6
        with:
          name: build-metadata-socket-server
          path: build-metadata/
          retention-days: 1

      # ============================================================
      # PREPARE STATIC SITE FOR PAGES (web-client only)
      # ============================================================
      - name: Prepare static site for Pages
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📦 Preparing static site for GitHub Pages..."
          mkdir -p pages-site
          
          rsync -a \
            --exclude 'node_modules' \
            --exclude 'Dockerfile*' \
            --exclude 'docker-compose.yml' \
            --exclude 'Makefile' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'DESIGN.md' \
            --exclude 'build.sh' \
            --exclude 'vite.config.js' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'js/tests' \
            "${{ matrix.path }}/" pages-site/
          
          echo "🌱 Including seed files..."
          mkdir -p pages-site/.seed pages-site/data
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/.seed/
            cp "${{ matrix.path }}/.seed/random-seed.json" pages-site/data/seed.json
            echo "✅ Seed files copied"
          fi
          if [ -f "${{ matrix.path }}/.seed/seed.js" ]; then
            cp "${{ matrix.path }}/.seed/seed.js" pages-site/.seed/
            echo "✅ seed.js copied"
          fi

      - name: Copy data files to Pages site
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Copying data files to Pages site..."
          
          if [ -f "LICENSE.md" ]; then
            cp LICENSE.md pages-site/
            echo "✅ LICENSE.md copied"
          fi
          
          echo "📄 Processing wiki.json..."
          WIKI_COPIED=false
          for src in "data/wiki.json" "misc/wiki.json" "${{ matrix.path }}/data/wiki.json"; do
            if [ -f "$src" ]; then
              cp "$src" pages-site/wiki.json
              cp "$src" pages-site/data/wiki.json 2>/dev/null || true
              echo "✅ wiki.json copied from $src"
              WIKI_COPIED=true
              break
            fi
          done
          if [ "$WIKI_COPIED" = false ]; then
            echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/wiki.json
            echo '{"title": "Fate'\''s Edge Wiki", "pages": []}' > pages-site/data/wiki.json
            echo "⚠️ No wiki.json found, created minimal version"
          fi
          
          echo "🗺️ Processing region files..."
          mkdir -p pages-site/regions pages-site/data/regions
          for src_dir in "data/regions" "misc/regions" "${{ matrix.path }}/data/regions" "${{ matrix.path }}/regions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir"/* pages-site/regions/ 2>/dev/null || true
              cp -r "$src_dir"/* pages-site/data/regions/ 2>/dev/null || true
              echo "✅ Regions copied from $src_dir"
              break
            fi
          done
          
          echo "🏛️ Processing faction files..."
          mkdir -p pages-site/factions pages-site/data/factions
          for src_dir in "data/factions" "misc/factions" "${{ matrix.path }}/data/factions" "${{ matrix.path }}/factions"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir"/* pages-site/factions/ 2>/dev/null || true
              cp -r "$src_dir"/* pages-site/data/factions/ 2>/dev/null || true
              echo "✅ Factions copied from $src_dir"
              break
            fi
          done
          
          echo "👤 Processing patron files..."
          mkdir -p pages-site/data/patrons
          for src_dir in "data/patrons" "misc/patrons" "${{ matrix.path }}/data/patrons"; do
            if [ -d "$src_dir" ]; then
              cp -r "$src_dir"/* pages-site/data/patrons/ 2>/dev/null || true
              echo "✅ Patrons copied from $src_dir"
              break
            fi
          done
          
          if [ -d "data" ]; then
            for file in data/*.json data/*.js; do
              if [ -f "$file" ] && [ "$(basename "$file")" != "wiki.json" ] && [ "$(basename "$file")" != "seed.json" ]; then
                cp "$file" pages-site/data/ 2>/dev/null || true
              fi
            done
            echo "✅ Additional data files copied"
          fi
          
          echo "✅ All data files copied successfully!"

      - name: Verify pages-site structure
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        run: |
          echo "📂 Pages site structure:"
          echo ""
          echo "Root contents:"
          ls -la pages-site/ | head -15
          echo ""
          echo "Data directory:"
          ls -la pages-site/data/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          echo "Regions directory:"
          ls -la pages-site/regions/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          echo "Factions directory:"
          ls -la pages-site/factions/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          echo "Patrons directory:"
          ls -la pages-site/data/patrons/ 2>/dev/null | head -10 || echo "  (empty or not found)"
          echo ""
          
          if [ -f "pages-site/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "⚠️ WARNING: index.html not found - site may not render correctly"
          fi

      - name: Upload Pages artifact
        if: ${{ env.SKIP_JOB != 'true' && matrix.name == 'web-client' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site