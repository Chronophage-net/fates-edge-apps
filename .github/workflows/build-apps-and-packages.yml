name: Build Apps and Packages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_web_deploy:
        type: boolean
        default: false
      skip_socket_deploy:
        type: boolean
        default: false

env:
  NODE_VERSION: 22

permissions:
  contents: read

concurrency:
  group: "build-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-client
            path: utilities/javascript/fates-edge-web-client
            needs_node: true
            build: true
            package: true
          # ... (other packages remain the same)

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      # ... (Node setup, cache, install, build, package steps are unchanged)

      # -----------------------------
      # Prepare Pages site (web-client) – REVISED
      # -----------------------------
      - name: Prepare static site for Pages
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        run: |
          mkdir -p pages-site

          # 1. Copy entire web-client directory (follow symlinks, exclude .git)
          rsync -aL --exclude=.git "${{ matrix.path }}/" pages-site/

          # 2. Remove unwanted files/folders (development, build configs, etc.)
          rm -rf \
            pages-site/node_modules \
            pages-site/package.json \
            pages-site/package-lock.json \
            pages-site/Dockerfile* \
            pages-site/docker-compose.yml \
            pages-site/Makefile \
            pages-site/DESIGN.md \
            pages-site/build.sh \
            pages-site/vite.config.js \
            pages-site/.gitignore \
            pages-site/.DS_Store \
            pages-site/js/tests

          # 3. Create seed directories and re-copy seed files (in case they were overwritten)
          mkdir -p pages-site/.seed pages-site/data
          if [ -f "${{ matrix.path }}/.seed/random-seed.json" ]; then
            cp -aL "${{ matrix.path }}/.seed/random-seed.json" pages-site/.seed/
            cp -aL "${{ matrix.path }}/.seed/random-seed.json" pages-site/data/seed.json
          fi
          if [ -f "${{ matrix.path }}/.seed/seed.js" ]; then
            cp -aL "${{ matrix.path }}/.seed/seed.js" pages-site/.seed/
          fi

      - name: Copy external data files
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        run: |
          mkdir -p pages-site/data pages-site/data/regions pages-site/data/factions pages-site/data/patrons

          # wiki.json
          for src in "data/wiki.json" "misc/wiki.json" "${{ matrix.path }}/data/wiki.json"; do
            if [ -f "$src" ]; then
              rsync -aL "$src" pages-site/wiki.json
              rsync -aL "$src" pages-site/data/wiki.json || true
              break
            fi
          done

          # regions
          for src in "data/data/regions" "misc/data/regions" "${{ matrix.path }}/data/regions"; do
            if [ -d "$src" ]; then
              rsync -aL "$src"/ pages-site/data/regions/
              break
            fi
          done

          # factions
          for src in "data/factions" "misc/factions" "${{ matrix.path }}/data/factions" "${{ matrix.path }}/factions"; do
            if [ -d "$src" ]; then
              rsync -aL "$src"/ pages-site/data/factions/
              break
            fi
          done

          # patrons
          for src in "data/patrons" "misc/patrons" "${{ matrix.path }}/data/patrons"; do
            if [ -d "$src" ]; then
              rsync -aL "$src"/ pages-site/data/patrons/
              break
            fi
          done

      - name: Verify and debug pages-site
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        run: |
          echo "=== Directory tree (first 100 files) ==="
          find pages-site -type f | head -100

          echo "=== File sizes ==="
          du -sh pages-site

          echo "=== Checking for symlinks ==="
          find pages-site -type l && { echo "❌ Symlinks found"; exit 1; } || echo "✅ No symlinks"

          echo "=== Checking for hard links ==="
          find pages-site -type f -links +1 && { echo "❌ Hard links found"; exit 1; } || echo "✅ No hard links"

          echo "=== File types ==="
          find pages-site -type f -exec file --brief {} \; | sort | uniq -c

      - name: Upload Pages artifact
        if: matrix.name == 'web-client' && (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_web_deploy != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: pages-site

  deploy-pages:
    name: Deploy Web Client to Pages
    needs: build
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_web_deploy != 'true'))
    uses: ./.github/workflows/deploy-web-client.yml
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit

  deploy-render:
    name: Deploy Socket Server to Render
    needs: build
    if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_socket_deploy != 'true'))
    uses: ./.github/workflows/deploy-socket-server-to-render.yml
    permissions:
      contents: read
      actions: read
    with:
      environment: production
    secrets: inherit